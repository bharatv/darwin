{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "darwin-ray-operator.fullname" . }}-manager-role
  labels:
    {{- include "darwin-ray-operator.labels" . | nindent 4 }}
rules:
  # DarwinRayCluster CRD permissions
  - apiGroups:
      - compute.darwin.io
    resources:
      - darwinrayclusters
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - compute.darwin.io
    resources:
      - darwinrayclusters/finalizers
    verbs:
      - update
  - apiGroups:
      - compute.darwin.io
    resources:
      - darwinrayclusters/status
    verbs:
      - get
      - patch
      - update
  # RayCluster CRD permissions (managed by this operator)
  - apiGroups:
      - ray.io
    resources:
      - rayclusters
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - ray.io
    resources:
      - rayclusters/status
    verbs:
      - get
  # Pod permissions for status calculation
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
      - list
      - watch
  # Service permissions
  - apiGroups:
      - ""
    resources:
      - services
    verbs:
      - get
      - list
      - watch
  # Events for observability
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
  # ConfigMaps for init scripts
  - apiGroups:
      - ""
    resources:
      - configmaps
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  # Leader election
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "darwin-ray-operator.fullname" . }}-manager-rolebinding
  labels:
    {{- include "darwin-ray-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "darwin-ray-operator.fullname" . }}-manager-role
subjects:
  - kind: ServiceAccount
    name: {{ include "darwin-ray-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
