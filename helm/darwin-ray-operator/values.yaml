# Default values for darwin-ray-operator

# Number of replicas (usually 1 with leader election)
replicaCount: 1

image:
  repository: darwin-ray-operator
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Namespace where Ray clusters are created
rayNamespace: ray

# Enable leader election for HA
leaderElection:
  enabled: true

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}

# Metrics configuration
metrics:
  enabled: true
  port: 8080

# Health probes configuration
health:
  port: 8081
  livenessProbe:
    initialDelaySeconds: 15
    periodSeconds: 20
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 10

# CRD installation - set to false if CRDs are managed separately
installCRDs: true

# RBAC configuration
rbac:
  create: true
