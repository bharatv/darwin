name: Darwin Catalog - CI

on:
  workflow_call: # Called by infrastructure-ci.yml after infra passes
  workflow_dispatch: # Allow manual triggering

jobs:
  lint:
    name: Linting
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: darwin-catalog

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Install Maven (if not present)
        run: |
          if ! command -v mvn &> /dev/null; then
            echo "Maven not found, installing..."
            cd /tmp
            curl -sL https://archive.apache.org/dist/maven/maven-3/3.9.6/binaries/apache-maven-3.9.6-bin.tar.gz | tar xz
            sudo mv apache-maven-3.9.6 /opt/maven
            echo "/opt/maven/bin" >> $GITHUB_PATH
            export PATH="/opt/maven/bin:$PATH"
          fi
          mvn --version
        working-directory: /

      - name: Run Spotless Check (Code Formatting)
        run: |
          echo "========================================"
          echo "Running Spotless Code Format Check..."
          echo "========================================"
          mvn spotless:check -B

      - name: Output Spotless Result
        if: success()
        run: |
          echo ""
          echo "✅ Code formatting check passed!"
          echo "All Java files follow Google Java Format standards."

      - name: Output Spotless Failure Details
        if: failure()
        run: |
          echo ""
          echo "❌ Code formatting check failed!"
          echo ""
          echo "Some files do not follow Google Java Format standards."
          echo "Run the following command locally to fix formatting:"
          echo ""
          echo "  cd darwin-catalog && mvn spotless:apply"
          echo ""
          echo "Then commit and push the changes."

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: darwin-catalog

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Install Maven (if not present)
        run: |
          if ! command -v mvn &> /dev/null; then
            echo "Maven not found, installing..."
            cd /tmp
            curl -sL https://archive.apache.org/dist/maven/maven-3/3.9.6/binaries/apache-maven-3.9.6-bin.tar.gz | tar xz
            sudo mv apache-maven-3.9.6 /opt/maven
            echo "/opt/maven/bin" >> $GITHUB_PATH
            export PATH="/opt/maven/bin:$PATH"
          fi
          mvn --version
        working-directory: /

      - name: Run unit tests
        run: |
          if [ -d "src" ]; then
            echo "Running unit tests..."
            mvn test -B || echo "⚠️ Some tests failed"
          else
            echo "⚠️ No src directory found, skipping"
          fi
        continue-on-error: true

  e2e-execution:
    name: End-to-End Execution
    runs-on: [self-hosted, Linux, X64, darwin]
    needs: [lint, unit-tests]
    timeout-minutes: 60
    env:
      KUBECONFIG: ./.setup/kindkubeconfig.yaml

    steps:
      # --- SETUP ---
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          clean: false
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Install Maven (if not present)
        run: |
          if ! command -v mvn &> /dev/null; then
            echo "Maven not found, installing..."
            cd /tmp
            curl -sL https://archive.apache.org/dist/maven/maven-3/3.9.6/binaries/apache-maven-3.9.6-bin.tar.gz | tar xz
            sudo mv apache-maven-3.9.6 /opt/maven
            echo "/opt/maven/bin" >> $GITHUB_PATH
            export PATH="/opt/maven/bin:$PATH"
          fi
          mvn --version
        working-directory: /

      - name: Setup cluster
        uses: ./.github/actions/setup-cluster
        with:
          kubeconfig_path: ./.setup/kindkubeconfig.yaml

      # --- DEPLOY ---
      - name: Initialize configuration
        run: |
          echo "📋 Running init.sh..."
          rm -f .setup/enabled-services.yaml
          printf "n\nn\nn\nn\nn\ny\nn\nn\ny\nn\n" | ./init.sh --dev-mode
          cat .setup/enabled-services.yaml

      - name: Build and setup
        run: |
          echo "🔨 Running setup.sh..."
          ./setup.sh -y -d

      - name: Clean up previous deployment
        run: |
          echo "🧹 Cleaning up previous deployment state..."
          helm uninstall darwin -n darwin --ignore-not-found --wait || true
          kubectl delete job darwin-datastore-health-check -n darwin --ignore-not-found || true
          kubectl delete pods -n darwin -l app.kubernetes.io/component=datastore-health-check --ignore-not-found || true
          sleep 5
          echo "✅ Previous deployment cleaned up"

      - name: Deploy services
        run: |
          echo "🚀 Running start.sh to deploy services..."

          (
            while true; do
              sleep 30
              echo ""
              echo "⏳ [$(date +%H:%M:%S)] Deployment in progress... Showing current status:"
              echo "   Helm releases:"
              helm list -n darwin 2>/dev/null | head -3 || echo "      (no releases yet)"
              echo "   Pod status:"
              kubectl get pods -n darwin --no-headers 2>/dev/null | head -10 | awk '{print "      " $1 ": " $3}' || echo "      (no pods yet)"
              echo ""
            done
          ) &
          STATUS_MONITOR_PID=$!

          set +e
          ./start.sh 2>&1 | tee /tmp/start.sh.log
          START_EXIT_CODE=${PIPESTATUS[0]}
          set -e

          kill $STATUS_MONITOR_PID 2>/dev/null || true

          if [ $START_EXIT_CODE -ne 0 ]; then
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "❌ DEPLOYMENT FAILED - Diagnostics Report"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "=== start.sh output ==="
            cat /tmp/start.sh.log || true
            echo ""
            echo "=== Helm releases ==="
            helm list -n darwin || true
            echo ""
            echo "=== Helm release status ==="
            helm status darwin -n darwin || true
            echo ""
            echo "=== All pods in darwin namespace ==="
            kubectl get pods -n darwin -o wide || true
            echo ""
            echo "=== Non-Ready pods details ==="
            for pod in $(kubectl get pods -n darwin --field-selector=status.phase!=Running,status.phase!=Succeeded -o name 2>/dev/null); do
              echo ""
              echo "  ▸ $pod"
              kubectl describe $pod -n darwin 2>/dev/null | grep -A10 "Events:" | tail -10 | sed 's/^/    /'
            done
            echo ""
            echo "=== PVC Status ==="
            kubectl get pvc -n darwin 2>/dev/null || echo "  (no PVCs found)"
            echo ""
            echo "=== PV Status ==="
            kubectl get pv 2>/dev/null | grep -E "darwin|NAME" || echo "  (no darwin PVs found)"
            echo ""
            echo "=== Recent Events (last 30) ==="
            kubectl get events -n darwin --sort-by='.lastTimestamp' 2>/dev/null | tail -30 || echo "  (no events)"
            echo ""
            echo "=== Failed pod logs ==="
            for pod in $(kubectl get pods -n darwin --field-selector=status.phase!=Running,status.phase!=Succeeded -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
              echo ""
              echo "--- Logs for pod: $pod ---"
              kubectl logs -n darwin "$pod" --tail=50 2>/dev/null || echo "  (no logs available)"
            done
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          fi

          echo "✅ Deployment completed successfully"

      - name: Wait for darwin-catalog pod
        run: |
          echo "⏳ Waiting for darwin-catalog pod..."
          max_attempts=60
          attempt=0
          while [ $attempt -lt $max_attempts ]; do
            POD_STATUS=$(kubectl get pods -n darwin -l app.kubernetes.io/component=catalog -o jsonpath='{.items[0].status.phase}' 2>/dev/null || echo "NotFound")
            READY=$(kubectl get pods -n darwin -l app.kubernetes.io/component=catalog -o jsonpath='{.items[0].status.containerStatuses[0].ready}' 2>/dev/null || echo "false")
            
            if [ "$POD_STATUS" = "Running" ] && [ "$READY" = "true" ]; then
              echo "✅ darwin-catalog pod is ready"
              kubectl get pods -n darwin -l app.kubernetes.io/component=catalog
              break
            fi
            
            echo "Attempt $((attempt+1))/$max_attempts: Waiting... (Status: $POD_STATUS, Ready: $READY)"
            sleep 5
            attempt=$((attempt+1))
          done

          if [ $attempt -eq $max_attempts ]; then
            echo "❌ Pod not ready after $max_attempts attempts"
            kubectl get pods -n darwin
            exit 1
          fi

      - name: Verify healthcheck
        run: |
          echo "🏥 Testing Darwin Catalog healthcheck..."

          max_attempts=30
          attempt=0
          while [ $attempt -lt $max_attempts ]; do
            if kubectl get pods -n ingress-nginx 2>/dev/null | grep -q "Running"; then
              echo "✅ Ingress controller is ready"
              break
            fi
            sleep 2
            attempt=$((attempt+1))
          done

          HEALTH_URL="http://localhost/darwin-catalog/healthcheck"
          echo "Testing endpoint: $HEALTH_URL"

          max_attempts=30
          attempt=0
          while [ $attempt -lt $max_attempts ]; do
            if curl -f -s "$HEALTH_URL" > /dev/null 2>&1; then
              echo "✅ Health check endpoint is accessible"
              break
            fi
            echo "Attempt $((attempt+1))/$max_attempts: Waiting..."
            sleep 2
            attempt=$((attempt+1))
          done

          if [ $attempt -eq $max_attempts ]; then
            echo "❌ Health check not accessible"
            exit 1
          fi

          response=$(curl -s "$HEALTH_URL")
          echo "Response: $response"

          if echo "$response" | grep -q "OK"; then
            echo "✅ Darwin Catalog health check passed!"
          else
            echo "❌ Invalid response - expected 'OK'"
            exit 1
          fi

      # --- INTEGRATION TESTS ---
      - name: Run integration tests
        run: |
          echo "🧪 Running integration tests..."
          # TODO: Add actual integration tests here
          echo "✅ Integration tests placeholder completed"

      # --- CLEANUP (always runs) ---
      - name: Cleanup
        if: always()
        uses: ./.github/actions/cleanup
        with:
          service_name: "darwin-catalog"
          delete_cluster: "false"
          delete_deployment: "true"
          prune_darwin_images: "true"
          prune_volumes: "false"
          prune_containers: "false"
          workspace_dir: ${{ github.workspace }}
