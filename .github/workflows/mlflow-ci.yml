name: MLflow CI

on:
  push:
    branches:
      - main
      - feat/mlflow-ci
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "mlflow/**"
      - ".github/workflows/mlflow-ci.yml"
  workflow_dispatch:
    inputs:
      run_lint:
        description: "Run lint and type check"
        required: false
        type: boolean
        default: true
      run_health_check:
        description: "Run service health check"
        required: false
        type: boolean
        default: true
      run_integration_test:
        description: "Run Kubernetes integration test"
        required: false
        type: boolean
        default: true
      python_version:
        description: "Python version to use"
        required: false
        type: choice
        options:
          - "3.9"
          - "3.10"
          - "3.11"
        default: "3.9"

permissions:
  contents: read
  pull-requests: write

jobs:
  lint-and-typecheck:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.run_lint == true || github.event_name != 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Using Python 3.9 (latest patch version) instead of 3.9.7 because 3.9.7 is not available for Ubuntu 24.04
          # The project requires Python 3.9.7+ (see mlflow/README.md), so any 3.9.x version satisfies this requirement
          python-version: ${{ github.event_name == 'workflow_dispatch' && inputs.python_version || '3.9' }}
          cache: "pip"
          cache-dependency-path: "mlflow/app_layer/requirements*.txt"

      - name: Install dependencies
        working-directory: mlflow/app_layer
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements_dev.txt

      - name: Run pylint on app_layer
        working-directory: mlflow/app_layer
        run: |
          echo "Running pylint on entire app_layer directory..."
          pylint src/ --rcfile=pyproject.toml

      - name: Run mypy on app_layer
        working-directory: mlflow/app_layer
        run: |
          echo "Running mypy on entire app_layer directory..."
          mypy src/ --config-file=pyproject.toml

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name != 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ github.event_name == 'workflow_dispatch' && inputs.python_version || '3.9' }}
          cache: "pip"
          cache-dependency-path: "mlflow/app_layer/requirements*.txt"

      - name: Install dependencies
        working-directory: mlflow/app_layer
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements_dev.txt
          pip install -e .

      - name: Run unit tests
        working-directory: mlflow/app_layer
        run: |
          echo "Running unit tests..."
          pytest tests/ -v

  service-health-check:
    name: Service Health Check
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.run_health_check == true || github.event_name != 'workflow_dispatch'

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_password
          MYSQL_DATABASE: darwin_mlflow
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      localstack:
        image: localstack/localstack:latest
        env:
          SERVICES: s3
          DEBUG: 1
        ports:
          - 4566:4566
        options: >-
          --health-cmd="curl -f http://localhost:4566/_localstack/health || exit 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Using Python 3.9 (latest patch version) instead of 3.9.7 because 3.9.7 is not available for Ubuntu 24.04
          # The project requires Python 3.9.7+ (see mlflow/README.md), so any 3.9.x version satisfies this requirement
          python-version: ${{ github.event_name == 'workflow_dispatch' && inputs.python_version || '3.9' }}
          cache: "pip"
          cache-dependency-path: |
            mlflow/app_layer/requirements*.txt
            mlflow/.odin/darwin-mlflow/setup.sh
            mlflow/.odin/darwin-mlflow-app/setup.sh

      - name: Install mysql-client
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client

      - name: Wait for MySQL to be ready
        run: |
          echo "Waiting for MySQL to be ready..."
          for i in {1..30}; do
            if mysql -h 127.0.0.1 -u root -ptest_password -e "SELECT 1" > /dev/null 2>&1; then
              echo "MySQL is ready!"
              break
            fi
            echo "Attempt $i/30 - MySQL not ready yet, waiting..."
            sleep 2
          done

      - name: Create MySQL user and grant privileges
        run: |
          echo "Creating MySQL user 'darwin' and granting privileges..."
          mysql -h 127.0.0.1 -u root -ptest_password <<EOF
          CREATE USER IF NOT EXISTS 'darwin'@'%' IDENTIFIED BY 'password';
          GRANT ALL PRIVILEGES ON *.* TO 'darwin'@'%';
          FLUSH PRIVILEGES;
          EOF

      - name: Wait for LocalStack to be ready
        run: |
          echo "Waiting for LocalStack to be ready..."
          for i in {1..30}; do
            if curl -f http://localhost:4566/_localstack/health > /dev/null 2>&1; then
              echo "LocalStack is ready!"
              break
            fi
            echo "Attempt $i/30 - LocalStack not ready yet, waiting..."
            sleep 2
          done

      - name: Set environment variables for darwin-mlflow
        run: |
          echo "BASE_DIR=${{ github.workspace }}/mlflow" >> $GITHUB_ENV
          echo "APP_DIR=${{ github.workspace }}/mlflow" >> $GITHUB_ENV
          echo "SERVICE_NAME=darwin-mlflow" >> $GITHUB_ENV
          echo "LOG_DIR=${{ runner.temp }}/darwin-mlflow-logs" >> $GITHUB_ENV
          echo "DEPLOYMENT_TYPE=local" >> $GITHUB_ENV
          echo "ENV=darwin-local" >> $GITHUB_ENV
          echo "PLATFORM=github-actions" >> $GITHUB_ENV
          echo "NAMESPACE=ci-test" >> $GITHUB_ENV
          echo "DARWIN_MYSQL_HOST=127.0.0.1" >> $GITHUB_ENV
          echo "DARWIN_MYSQL_USERNAME=root" >> $GITHUB_ENV
          echo "DARWIN_MYSQL_PASSWORD=test_password" >> $GITHUB_ENV
          echo "VAULT_SERVICE_MYSQL_USERNAME=darwin" >> $GITHUB_ENV
          echo "VAULT_SERVICE_MYSQL_PASSWORD=password" >> $GITHUB_ENV
          echo "CONFIG_SERVICE_MYSQL_DATABASE=darwin_mlflow" >> $GITHUB_ENV
          echo "CONFIG_SERVICE_MYSQL_AUTH_DATABASE=darwin_mlflow_auth" >> $GITHUB_ENV
          echo "CONFIG_SERVICE_MYSQL_MASTERHOST=127.0.0.1" >> $GITHUB_ENV
          echo "MYSQL_PORT=3306" >> $GITHUB_ENV
          echo "AWS_ENDPOINT_OVERRIDE=http://localhost:4566" >> $GITHUB_ENV
          echo "AWS_ACCESS_KEY_ID=test" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=test" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=us-east-1" >> $GITHUB_ENV
          echo "MLFLOW_S3_BUCKET=darwin-mlflow" >> $GITHUB_ENV
          echo "MLFLOW_S3_ENDPOINT_URL=http://localhost:4566" >> $GITHUB_ENV
          echo "MLFLOW_UI_URL=http://localhost:8080" >> $GITHUB_ENV
          echo "MLFLOW_APP_LAYER_URL=http://127.0.0.1:8000" >> $GITHUB_ENV
          echo "MLFLOW_APP_BASE_PATH=" >> $GITHUB_ENV
          echo "VAULT_SERVICE_MLFLOW_ADMIN_USERNAME=darwin" >> $GITHUB_ENV
          echo "VAULT_SERVICE_MLFLOW_ADMIN_PASSWORD=password" >> $GITHUB_ENV
          echo "VAULT_SERVICE_ADMIN_USERNAME=darwin" >> $GITHUB_ENV
          echo "VAULT_SERVICE_ADMIN_PASSWORD=password" >> $GITHUB_ENV
          echo "MLFLOW_AUTH_ENABLED=false" >> $GITHUB_ENV

      - name: Setup darwin-mlflow dependencies
        working-directory: mlflow
        run: |
          echo "Running darwin-mlflow setup.sh..."
          chmod +x .odin/darwin-mlflow/setup.sh
          bash .odin/darwin-mlflow/setup.sh

      - name: Initialize darwin-mlflow databases
        working-directory: mlflow
        run: |
          echo "Running darwin-mlflow pre-deploy.sh..."
          chmod +x .odin/darwin-mlflow/pre-deploy.sh
          bash .odin/darwin-mlflow/pre-deploy.sh

      - name: Start darwin-mlflow server
        working-directory: mlflow
        run: |
          echo "Starting darwin-mlflow server on port 8080..."
          chmod +x .odin/darwin-mlflow/start.sh
          bash .odin/darwin-mlflow/start.sh > /tmp/darwin-mlflow.log 2>&1 &
          MLFLOW_PID=$!
          if [ -z "$MLFLOW_PID" ] || [ "$MLFLOW_PID" -le 0 ]; then
            echo "ERROR: Failed to start darwin-mlflow process!"
            cat /tmp/darwin-mlflow.log || true
            exit 1
          fi
          echo "$MLFLOW_PID" > /tmp/darwin-mlflow.pid
          echo "darwin-mlflow PID: $MLFLOW_PID"

          # Give the process a moment to start
          sleep 20

          # Check if process is still running
          if ! ps -p "$MLFLOW_PID" > /dev/null 2>&1; then
            echo "ERROR: darwin-mlflow process died immediately!"
            echo "Logs:"
            cat /tmp/darwin-mlflow.log || true
            exit 1
          fi

          set +e  # Disable exit on error for curl commands
          echo "Waiting for darwin-mlflow to be ready on port 8080..."

          for i in {1..40}; do
            # Check if process is still running
            if ! ps -p "$MLFLOW_PID" > /dev/null 2>&1; then
              echo "ERROR: darwin-mlflow process died!"
              echo "Logs:"
              tail -n 100 /tmp/darwin-mlflow.log || true
              exit 1
            fi
            if curl -f http://127.0.0.1:8080/health > /tmp/curl-log.log 2>&1; then
              echo "darwin-mlflow is ready!"
              break
            fi
            echo "Attempt $i/40 - darwin-mlflow not ready yet, waiting..."
            tail -n 100 /tmp/curl-log.log || true
            sleep 3
          done

          # Final check
          if ! curl -f http://127.0.0.1:8080/health > /tmp/curl-log.log 2>&1; then
            echo "ERROR: darwin-mlflow failed to become ready!"
            echo "Checking logs:"
            tail -n 100 /tmp/darwin-mlflow.log || true
            exit 1
          fi

          echo "Testing darwin-mlflow /health endpoint..."
          response=$(curl -s http://127.0.0.1:8080/health)
          echo "Response: $response"

          if echo "$response" | grep -q "OK"; then
            echo "✅ Health check passed!"
          else
            echo "❌ Health check failed! Expected response: OK"
            exit 1
          fi

      - name: Setup darwin-mlflow-app dependencies
        working-directory: mlflow
        run: |
          echo "Running darwin-mlflow-app setup.sh..."
          chmod +x .odin/darwin-mlflow-app/setup.sh
          export SERVICE_NAME=darwin-mlflow-app
          bash .odin/darwin-mlflow-app/setup.sh

      - name: Start and Test darwin-mlflow-app server
        working-directory: mlflow
        run: |
          echo "Starting darwin-mlflow-app server on port 8000..."
          chmod +x .odin/darwin-mlflow-app/start.sh
          export SERVICE_NAME=darwin-mlflow-app
          bash .odin/darwin-mlflow-app/start.sh > /tmp/darwin-mlflow-app.log 2>&1 &
          echo $! > /tmp/darwin-mlflow-app.pid
          echo "darwin-mlflow-app PID: $(cat /tmp/darwin-mlflow-app.pid)"

          # Give the process a moment to start
          sleep 2

          # Check if process is still running
          if ! ps -p $(cat /tmp/darwin-mlflow-app.pid) > /dev/null 2>&1; then
            echo "ERROR: darwin-mlflow-app process died immediately!"
            echo "Logs:"
            cat /tmp/darwin-mlflow-app.log || true
            exit 1
          fi

          echo "Waiting for darwin-mlflow-app to be ready on port 8000..."
          for i in {1..60}; do
            # Check if process is still running
            if ! ps -p $(cat /tmp/darwin-mlflow-app.pid) > /dev/null 2>&1; then
              echo "ERROR: darwin-mlflow-app process died!"
              echo "Logs:"
              tail -n 100 /tmp/darwin-mlflow-app.log || true
              exit 1
            fi
            if curl -f http://127.0.0.1:8000/health > /tmp/curl-log.log 2>&1; then
              echo "darwin-mlflow-app is ready!"
              break
            fi
            echo "Attempt $i/60 - darwin-mlflow-app not ready yet, waiting..."
            tail -n 100 /tmp/curl-log.log || true
            sleep 3
          done

          # Final check
          if ! curl -f http://127.0.0.1:8000/health > /tmp/curl-log.log 2>&1; then
            echo "ERROR: darwin-mlflow-app failed to become ready!"
            echo "Checking logs:"
            tail -n 100 /tmp/darwin-mlflow-app.log || true
            exit 1
          fi

          echo "Testing darwin-mlflow-app /health endpoint..."
          response=$(curl -s http://127.0.0.1:8000/health)
          echo "Response: $response"

          if echo "$response" | grep -q '"status":"SUCCESS"' || echo "$response" | grep -q '"status": "SUCCESS"'; then
            echo "✅ Health check passed!"
          else
            echo "❌ Health check failed! Expected status: SUCCESS"
            exit 1
          fi

      - name: Display service logs on failure
        if: failure()
        run: |
          echo "=== darwin-mlflow logs ==="
          cat /tmp/darwin-mlflow.log || echo "No darwin-mlflow logs found"
          echo ""
          echo "=== darwin-mlflow-app logs ==="
          cat /tmp/darwin-mlflow-app.log || echo "No darwin-mlflow-app logs found"

      - name: Cleanup services
        if: always()
        run: |
          echo "Stopping services..."
          if [ -f /tmp/darwin-mlflow-app.pid ]; then
            kill $(cat /tmp/darwin-mlflow-app.pid) 2>/dev/null || true
          fi
          if [ -f /tmp/darwin-mlflow.pid ]; then
            kill $(cat /tmp/darwin-mlflow.pid) 2>/dev/null || true
          fi
          echo "Services stopped"

  mlflow-integration-test:
    name: MLflow Integration Test with Kubernetes
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event_name == 'workflow_dispatch' && inputs.run_integration_test == true || github.event_name != 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: "11"
          distribution: "temurin"

      - name: Set up Go 1.18
        uses: actions/setup-go@v5
        with:
          go-version: "1.18"

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Install kind
        run: |
          # Download to /tmp to avoid conflict with kind directory in repo
          curl -Lo /tmp/kind https://kind.sigs.k8s.io/dl/v0.20.0/kind-linux-amd64
          chmod +x /tmp/kind
          sudo mv /tmp/kind /usr/local/bin/kind
          echo "DEBUG: kind installed, checking..."
          which kind
          kind --version
          echo "DEBUG: PATH after kind install: $PATH"

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl
          kubectl version --client

      - name: Install Helm
        run: |
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          helm version

      - name: Cache Darwin dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-mlflow-integration-${{ hashFiles('mlflow/app_layer/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-mlflow-integration-

      - name: Initialize Darwin configuration for MLflow only
        run: |
          # Enable all services first
          ./init.sh --all

          # Modify configuration to enable only MLflow services
          echo "Configuring MLflow-only deployment..."

          # Disable all applications except MLflow
          yq eval '.applications.darwin-ofs-v2 = false' -i .setup/enabled-services.yaml
          yq eval '.applications.darwin-ofs-v2-admin = false' -i .setup/enabled-services.yaml
          yq eval '.applications.darwin-ofs-v2-consumer = false' -i .setup/enabled-services.yaml
          yq eval '.applications.darwin-mlflow = true' -i .setup/enabled-services.yaml
          yq eval '.applications.darwin-mlflow-app = true' -i .setup/enabled-services.yaml
          yq eval '.applications.chronos = false' -i .setup/enabled-services.yaml
          yq eval '.applications.chronos-consumer = false' -i .setup/enabled-services.yaml
          yq eval '.applications.darwin-compute = false' -i .setup/enabled-services.yaml
          yq eval '.applications.darwin-cluster-manager = false' -i .setup/enabled-services.yaml
          yq eval '.applications.darwin-workspace = false' -i .setup/enabled-services.yaml
          yq eval '.applications.ml-serve-app = false' -i .setup/enabled-services.yaml
          yq eval '.applications.artifact-builder = false' -i .setup/enabled-services.yaml
          yq eval '.applications.darwin-catalog = false' -i .setup/enabled-services.yaml

          # Keep only required datastores: mysql and localstack
          yq eval '.datastores.mysql = true' -i .setup/enabled-services.yaml
          yq eval '.datastores.cassandra = false' -i .setup/enabled-services.yaml
          yq eval '.datastores.kafka = false' -i .setup/enabled-services.yaml
          yq eval '.datastores.zookeeper = false' -i .setup/enabled-services.yaml
          yq eval '.datastores.airflow = false' -i .setup/enabled-services.yaml
          yq eval '.datastores.rabbitmq = false' -i .setup/enabled-services.yaml
          yq eval '.datastores.localstack = true' -i .setup/enabled-services.yaml
          yq eval '.datastores.opensearch = false' -i .setup/enabled-services.yaml
          yq eval '.datastores.busybox = true' -i .setup/enabled-services.yaml

          # Disable ray and serve images
          yq eval '.ray-images = []' -i .setup/enabled-services.yaml
          yq eval '.serve-images = []' -i .setup/enabled-services.yaml

          echo "MLflow-only configuration complete"
          echo "Enabled services:"
          cat .setup/enabled-services.yaml

      - name: Setup Darwin platform
        run: |
          echo "DEBUG: Before setup.sh - checking kind availability..."
          which kind || echo "kind not found in PATH"
          command -v kind || echo "command -v kind failed"
          echo "DEBUG: Current PATH: $PATH"
          ./setup.sh -y

      - name: Deploy Darwin platform
        run: |
          ./start.sh

      - name: Wait for MLflow services to be ready
        run: |
          source config.env
          echo "Waiting for MLflow services to be ready..."

          # Wait for darwin-mlflow (MLflow backend)
          echo "Checking darwin-mlflow (MLflow backend)..."
          kubectl wait --for=condition=ready pod -l app=mlflow-lib -n darwin --timeout=300s || {
            echo "ERROR: darwin-mlflow pods failed to become ready"
            kubectl get pods -n darwin -l app=mlflow-lib
            kubectl describe pods -n darwin -l app=mlflow-lib
            exit 1
          }

          # Wait for darwin-mlflow-app (FastAPI app layer)
          echo "Checking darwin-mlflow-app (FastAPI app layer)..."
          kubectl wait --for=condition=ready pod -l app=mlflow-app -n darwin --timeout=300s || {
            echo "ERROR: darwin-mlflow-app pods failed to become ready"
            kubectl get pods -n darwin -l app=mlflow-app
            kubectl describe pods -n darwin -l app=mlflow-app
            exit 1
          }

          # Give services additional time to initialize
          echo "Waiting for services to fully initialize..."
          sleep 30

          echo "✅ MLflow services are ready"
          echo ""
          echo "Platform status:"
          kubectl get pods -n darwin
          echo ""
          kubectl get services -n darwin
          echo ""
          kubectl get ingress -n darwin

      - name: Verify MLflow backend health
        run: |
          echo "Testing MLflow backend health endpoint..."

          # Test MLflow backend at /mlflow/health
          for i in {1..30}; do
            if curl -f http://localhost/mlflow/health > /tmp/mlflow-health.log 2>&1; then
              response=$(curl -s http://localhost/mlflow/health)
              echo "MLflow backend response: $response"
              
              if echo "$response" | grep -q "OK"; then
                echo "✅ MLflow backend health check passed!"
                break
              else
                echo "⚠️  Unexpected response from MLflow backend"
                cat /tmp/mlflow-health.log
              fi
            fi
            
            if [ $i -eq 30 ]; then
              echo "❌ MLflow backend health check failed after 30 attempts"
              echo "Curl output:"
              cat /tmp/mlflow-health.log || true
              echo ""
              echo "Pod logs:"
              kubectl logs -n darwin -l app=mlflow-lib --tail=100 || true
              exit 1
            fi
            
            echo "Attempt $i/30 - MLflow backend not ready, waiting..."
            sleep 3
          done

      - name: Verify MLflow app layer health
        run: |
          echo "Testing MLflow app layer health endpoint..."

          # Test MLflow app layer at /mlflow-app/health
          for i in {1..30}; do
            if curl -f http://localhost/mlflow-app/health > /tmp/mlflow-app-health.log 2>&1; then
              response=$(curl -s http://localhost/mlflow-app/health)
              echo "MLflow app layer response: $response"
              
              if echo "$response" | grep -q '"status":"SUCCESS"' || echo "$response" | grep -q '"status": "SUCCESS"'; then
                echo "✅ MLflow app layer health check passed!"
                break
              else
                echo "⚠️  Unexpected response from MLflow app layer"
                cat /tmp/mlflow-app-health.log
              fi
            fi
            
            if [ $i -eq 30 ]; then
              echo "❌ MLflow app layer health check failed after 30 attempts"
              echo "Curl output:"
              cat /tmp/mlflow-app-health.log || true
              echo ""
              echo "Pod logs:"
              kubectl logs -n darwin -l app=mlflow-app --tail=100 || true
              exit 1
            fi
            
            echo "Attempt $i/30 - MLflow app layer not ready, waiting..."
            sleep 3
          done

      - name: Verify MLflow UI accessibility
        run: |
          echo "Testing MLflow UI accessibility..."

          # Test MLflow UI at /mlflow/
          if curl -f -s -o /dev/null -w "%{http_code}" http://localhost/mlflow/ | grep -q "200"; then
            echo "✅ MLflow UI is accessible at http://localhost/mlflow/"
          else
            echo "❌ MLflow UI is not accessible"
            echo "Checking ingress configuration:"
            kubectl get ingress -n darwin -o yaml
            exit 1
          fi

      - name: Display final platform status
        if: always()
        run: |
          echo "=== Final Platform Status ==="
          echo ""
          echo "Pods:"
          kubectl get pods -n darwin -o wide
          echo ""
          echo "Services:"
          kubectl get services -n darwin
          echo ""
          echo "Ingress:"
          kubectl get ingress -n darwin -o yaml
          echo ""
          echo "Events:"
          kubectl get events -n darwin --sort-by='.lastTimestamp' | tail -20

      - name: Display service logs on failure
        if: failure()
        run: |
          echo "=== darwin-mlflow (MLflow backend) logs ==="
          kubectl logs -n darwin -l app=mlflow-lib --tail=200 || echo "No darwin-mlflow logs found"
          echo ""
          echo "=== darwin-mlflow-app (FastAPI app layer) logs ==="
          kubectl logs -n darwin -l app=mlflow-app --tail=200 || echo "No darwin-mlflow-app logs found"
          echo ""
          echo "=== MySQL logs ==="
          kubectl logs -n darwin -l app=mysql --tail=100 || echo "No MySQL logs found"
          echo ""
          echo "=== LocalStack logs ==="
          kubectl logs -n darwin -l app=localstack --tail=100 || echo "No LocalStack logs found"

      - name: Cleanup
        if: always()
        run: |
          echo "Cleaning up resources..."
          kind delete cluster --name kind || true
          echo "Cleanup complete"
