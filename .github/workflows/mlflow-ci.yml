name: MLflow CI

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "mlflow/**"
      - ".github/workflows/mlflow-ci.yml"
  workflow_dispatch:
    inputs:
      run_lint:
        description: "Run lint and type check"
        required: false
        type: boolean
        default: true
      run_health_check:
        description: "Run service health check"
        required: false
        type: boolean
        default: true
      python_version:
        description: "Python version to use"
        required: false
        type: choice
        options:
          - "3.9"
          - "3.10"
          - "3.11"
        default: "3.9"
jobs:
  lint-and-typecheck:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.run_lint == true || github.event_name != 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Using Python 3.9 (latest patch version) instead of 3.9.7 because 3.9.7 is not available for Ubuntu 24.04
          # The project requires Python 3.9.7+ (see mlflow/README.md), so any 3.9.x version satisfies this requirement
          python-version: ${{ github.event_name == 'workflow_dispatch' && inputs.python_version || '3.9' }}
          cache: "pip"
          cache-dependency-path: "mlflow/app_layer/requirements*.txt"

      - name: Install dependencies
        working-directory: mlflow/app_layer
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements_dev.txt

      - name: Run pylint on app_layer
        working-directory: mlflow/app_layer
        run: |
          echo "Running pylint on entire app_layer directory..."
          pylint src/ --rcfile=pyproject.toml

      - name: Run mypy on app_layer
        working-directory: mlflow/app_layer
        run: |
          echo "Running mypy on entire app_layer directory..."
          mypy src/ --config-file=pyproject.toml

  service-health-check:
    name: Service Health Check
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.run_health_check == true || github.event_name != 'workflow_dispatch'

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_password
          MYSQL_DATABASE: darwin_mlflow
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      localstack:
        image: localstack/localstack:latest
        env:
          SERVICES: s3
          DEBUG: 1
        ports:
          - 4566:4566
        options: >-
          --health-cmd="curl -f http://localhost:4566/_localstack/health || exit 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Using Python 3.9 (latest patch version) instead of 3.9.7 because 3.9.7 is not available for Ubuntu 24.04
          # The project requires Python 3.9.7+ (see mlflow/README.md), so any 3.9.x version satisfies this requirement
          python-version: ${{ github.event_name == 'workflow_dispatch' && inputs.python_version || '3.9' }}
          cache: "pip"
          cache-dependency-path: |
            mlflow/app_layer/requirements*.txt
            mlflow/.odin/darwin-mlflow/setup.sh
            mlflow/.odin/darwin-mlflow-app/setup.sh

      - name: Install mysql-client
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client

      - name: Wait for MySQL to be ready
        run: |
          echo "Waiting for MySQL to be ready..."
          for i in {1..30}; do
            if mysql -h 127.0.0.1 -u root -ptest_password -e "SELECT 1" > /dev/null 2>&1; then
              echo "MySQL is ready!"
              break
            fi
            echo "Attempt $i/30 - MySQL not ready yet, waiting..."
            sleep 2
          done

      - name: Create MySQL user and grant privileges
        run: |
          echo "Creating MySQL user 'darwin' and granting privileges..."
          mysql -h 127.0.0.1 -u root -ptest_password <<EOF
          CREATE USER IF NOT EXISTS 'darwin'@'%' IDENTIFIED BY 'password';
          GRANT ALL PRIVILEGES ON *.* TO 'darwin'@'%';
          FLUSH PRIVILEGES;
          EOF

      - name: Wait for LocalStack to be ready
        run: |
          echo "Waiting for LocalStack to be ready..."
          for i in {1..30}; do
            if curl -f http://localhost:4566/_localstack/health > /dev/null 2>&1; then
              echo "LocalStack is ready!"
              break
            fi
            echo "Attempt $i/30 - LocalStack not ready yet, waiting..."
            sleep 2
          done

      - name: Set environment variables for darwin-mlflow
        run: |
          echo "BASE_DIR=${{ github.workspace }}/mlflow" >> $GITHUB_ENV
          echo "APP_DIR=${{ github.workspace }}/mlflow" >> $GITHUB_ENV
          echo "SERVICE_NAME=darwin-mlflow" >> $GITHUB_ENV
          echo "LOG_DIR=${{ runner.temp }}/darwin-mlflow-logs" >> $GITHUB_ENV
          echo "DEPLOYMENT_TYPE=local" >> $GITHUB_ENV
          echo "ENV=darwin-local" >> $GITHUB_ENV
          echo "PLATFORM=github-actions" >> $GITHUB_ENV
          echo "NAMESPACE=ci-test" >> $GITHUB_ENV
          echo "DARWIN_MYSQL_HOST=127.0.0.1" >> $GITHUB_ENV
          echo "DARWIN_MYSQL_USERNAME=root" >> $GITHUB_ENV
          echo "DARWIN_MYSQL_PASSWORD=test_password" >> $GITHUB_ENV
          echo "VAULT_SERVICE_MYSQL_USERNAME=darwin" >> $GITHUB_ENV
          echo "VAULT_SERVICE_MYSQL_PASSWORD=password" >> $GITHUB_ENV
          echo "CONFIG_SERVICE_MYSQL_DATABASE=darwin_mlflow" >> $GITHUB_ENV
          echo "CONFIG_SERVICE_MYSQL_AUTH_DATABASE=darwin_mlflow_auth" >> $GITHUB_ENV
          echo "CONFIG_SERVICE_MYSQL_MASTERHOST=127.0.0.1" >> $GITHUB_ENV
          echo "MYSQL_PORT=3306" >> $GITHUB_ENV
          echo "AWS_ENDPOINT_OVERRIDE=http://localhost:4566" >> $GITHUB_ENV
          echo "AWS_ACCESS_KEY_ID=test" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=test" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=us-east-1" >> $GITHUB_ENV
          echo "MLFLOW_S3_BUCKET=darwin-mlflow" >> $GITHUB_ENV
          echo "MLFLOW_S3_ENDPOINT_URL=http://localhost:4566" >> $GITHUB_ENV
          echo "MLFLOW_UI_URL=http://localhost:8080" >> $GITHUB_ENV
          echo "MLFLOW_APP_LAYER_URL=http://127.0.0.1:8000" >> $GITHUB_ENV
          echo "MLFLOW_APP_BASE_PATH=" >> $GITHUB_ENV
          echo "VAULT_SERVICE_MLFLOW_ADMIN_USERNAME=darwin" >> $GITHUB_ENV
          echo "VAULT_SERVICE_MLFLOW_ADMIN_PASSWORD=password" >> $GITHUB_ENV
          echo "VAULT_SERVICE_ADMIN_USERNAME=darwin" >> $GITHUB_ENV
          echo "VAULT_SERVICE_ADMIN_PASSWORD=password" >> $GITHUB_ENV
          echo "MLFLOW_AUTH_ENABLED=false" >> $GITHUB_ENV

      - name: Setup darwin-mlflow dependencies
        working-directory: mlflow
        run: |
          echo "Running darwin-mlflow setup.sh..."
          chmod +x .odin/darwin-mlflow/setup.sh
          bash .odin/darwin-mlflow/setup.sh

      - name: Initialize darwin-mlflow databases
        working-directory: mlflow
        run: |
          echo "Running darwin-mlflow pre-deploy.sh..."
          chmod +x .odin/darwin-mlflow/pre-deploy.sh
          bash .odin/darwin-mlflow/pre-deploy.sh

      - name: Start darwin-mlflow server
        working-directory: mlflow
        run: |
          echo "Starting darwin-mlflow server on port 8080..."
          chmod +x .odin/darwin-mlflow/start.sh
          bash .odin/darwin-mlflow/start.sh > /tmp/darwin-mlflow.log 2>&1 &
          MLFLOW_PID=$!
          if [ -z "$MLFLOW_PID" ] || [ "$MLFLOW_PID" -le 0 ]; then
            echo "ERROR: Failed to start darwin-mlflow process!"
            cat /tmp/darwin-mlflow.log || true
            exit 1
          fi
          echo "$MLFLOW_PID" > /tmp/darwin-mlflow.pid
          echo "darwin-mlflow PID: $MLFLOW_PID"

          # Give the process a moment to start
          sleep 20

          # Check if process is still running
          if ! ps -p "$MLFLOW_PID" > /dev/null 2>&1; then
            echo "ERROR: darwin-mlflow process died immediately!"
            echo "Logs:"
            cat /tmp/darwin-mlflow.log || true
            exit 1
          fi

          set +e  # Disable exit on error for curl commands
          echo "Waiting for darwin-mlflow to be ready on port 8080..."

          for i in {1..40}; do
            # Check if process is still running
            if ! ps -p "$MLFLOW_PID" > /dev/null 2>&1; then
              echo "ERROR: darwin-mlflow process died!"
              echo "Logs:"
              tail -n 100 /tmp/darwin-mlflow.log || true
              exit 1
            fi
            if curl -f http://127.0.0.1:8080/health > /tmp/curl-log.log 2>&1; then
              echo "darwin-mlflow is ready!"
              break
            fi
            echo "Attempt $i/40 - darwin-mlflow not ready yet, waiting..."
            tail -n 100 /tmp/curl-log.log || true
            sleep 3
          done

          # Final check
          if ! curl -f http://127.0.0.1:8080/health > /tmp/curl-log.log 2>&1; then
            echo "ERROR: darwin-mlflow failed to become ready!"
            echo "Checking logs:"
            tail -n 100 /tmp/darwin-mlflow.log || true
            exit 1
          fi

          echo "Testing darwin-mlflow /health endpoint..."
          response=$(curl -s http://127.0.0.1:8080/health)
          echo "Response: $response"

          if echo "$response" | grep -q "OK"; then
            echo "✅ Health check passed!"
          else
            echo "❌ Health check failed! Expected response: OK"
            exit 1
          fi

      - name: Setup darwin-mlflow-app dependencies
        working-directory: mlflow
        run: |
          echo "Running darwin-mlflow-app setup.sh..."
          chmod +x .odin/darwin-mlflow-app/setup.sh
          export SERVICE_NAME=darwin-mlflow-app
          bash .odin/darwin-mlflow-app/setup.sh

      - name: Start and Test darwin-mlflow-app server
        working-directory: mlflow
        run: |
          echo "Starting darwin-mlflow-app server on port 8000..."
          chmod +x .odin/darwin-mlflow-app/start.sh
          export SERVICE_NAME=darwin-mlflow-app
          bash .odin/darwin-mlflow-app/start.sh > /tmp/darwin-mlflow-app.log 2>&1 &
          echo $! > /tmp/darwin-mlflow-app.pid
          echo "darwin-mlflow-app PID: $(cat /tmp/darwin-mlflow-app.pid)"

          # Give the process a moment to start
          sleep 2

          # Check if process is still running
          if ! ps -p $(cat /tmp/darwin-mlflow-app.pid) > /dev/null 2>&1; then
            echo "ERROR: darwin-mlflow-app process died immediately!"
            echo "Logs:"
            cat /tmp/darwin-mlflow-app.log || true
            exit 1
          fi

          echo "Waiting for darwin-mlflow-app to be ready on port 8000..."
          for i in {1..60}; do
            # Check if process is still running
            if ! ps -p $(cat /tmp/darwin-mlflow-app.pid) > /dev/null 2>&1; then
              echo "ERROR: darwin-mlflow-app process died!"
              echo "Logs:"
              tail -n 100 /tmp/darwin-mlflow-app.log || true
              exit 1
            fi
            if curl -f http://127.0.0.1:8000/health > /tmp/curl-log.log 2>&1; then
              echo "darwin-mlflow-app is ready!"
              break
            fi
            echo "Attempt $i/60 - darwin-mlflow-app not ready yet, waiting..."
            tail -n 100 /tmp/curl-log.log || true
            sleep 3
          done

          # Final check
          if ! curl -f http://127.0.0.1:8000/health > /tmp/curl-log.log 2>&1; then
            echo "ERROR: darwin-mlflow-app failed to become ready!"
            echo "Checking logs:"
            tail -n 100 /tmp/darwin-mlflow-app.log || true
            exit 1
          fi

          echo "Testing darwin-mlflow-app /health endpoint..."
          response=$(curl -s http://127.0.0.1:8000/health)
          echo "Response: $response"

          if echo "$response" | grep -q '"status":"SUCCESS"' || echo "$response" | grep -q '"status": "SUCCESS"'; then
            echo "✅ Health check passed!"
          else
            echo "❌ Health check failed! Expected status: SUCCESS"
            exit 1
          fi

      - name: Display service logs on failure
        if: failure()
        run: |
          echo "=== darwin-mlflow logs ==="
          cat /tmp/darwin-mlflow.log || echo "No darwin-mlflow logs found"
          echo ""
          echo "=== darwin-mlflow-app logs ==="
          cat /tmp/darwin-mlflow-app.log || echo "No darwin-mlflow-app logs found"

      - name: Cleanup services
        if: always()
        run: |
          echo "Stopping services..."
          if [ -f /tmp/darwin-mlflow-app.pid ]; then
            kill $(cat /tmp/darwin-mlflow-app.pid) 2>/dev/null || true
          fi
          if [ -f /tmp/darwin-mlflow.pid ]; then
            kill $(cat /tmp/darwin-mlflow.pid) 2>/dev/null || true
          fi
          echo "Services stopped"
