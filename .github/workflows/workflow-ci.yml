name: Darwin Workflow - CI

on:
  workflow_call: # Called by infrastructure-ci.yml after infra passes
  workflow_dispatch: # Allow manual triggering

jobs:
  lint:
    name: Linting
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: darwin-workflow

    strategy:
      matrix:
        module:
          - app_layer
          - core
          - model
          - sdk
          - airflow

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8==6.0.0 mypy==1.3.0

      - name: Install module dependencies
        run: |
          echo "Installing dependencies for ${{ matrix.module }}..."
          # For linting, we only need dev dependencies (flake8, mypy are already installed)
          # Skip requirements.txt as it may contain relative path dependencies (-e ../core)
          # that aren't needed for static analysis
          if [ -f "${{ matrix.module }}/requirements_dev.txt" ]; then
            pip install -r ${{ matrix.module }}/requirements_dev.txt
          fi
          echo "✅ Dependencies installed (skipping requirements.txt for linting)"

      - name: Run flake8
        run: |
          if [ -d "${{ matrix.module }}/src" ]; then
            echo "Running flake8 on ${{ matrix.module }}/src..."
            # Only check for critical errors: undefined names (F821) and syntax errors (E9)
            # Ignore style issues: whitespace, blank lines, unused imports, line length, spacing, unused variables
            # Exclude template files (they have variables like dag_config defined at runtime)
            flake8 --max-line-length=160 \
              --extend-ignore=E203,W503,W293,W291,W292,W391,F401,E501,E231,E302,E303,E305,E251,E252,E127,E128,E131,E122,E114,E117,E265,E266,E402,E722,E741,E731,F841,F811,F541,F403 \
              --select=F821,E9 \
              --exclude='*/templates/*,*/artefact_template.py' \
              ${{ matrix.module }}/src
            echo "✅ flake8 passed for ${{ matrix.module }} (critical errors only)"
          else
            echo "⚠️  No src directory found in ${{ matrix.module }}, skipping flake8"
          fi

      - name: Run mypy
        run: |
          if [ -d "${{ matrix.module }}/src" ]; then
            echo "Running mypy on ${{ matrix.module }}/src..."
            mypy ${{ matrix.module }}/src --ignore-missing-imports --no-strict-optional || true
            echo "✅ mypy completed for ${{ matrix.module }}"
          else
            echo "⚠️  No src directory found in ${{ matrix.module }}, skipping mypy"
          fi
        continue-on-error: true

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: darwin-workflow

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt || true
          fi
          pip install pytest pytest-cov

      - name: Run unit tests
        run: |
          if [ -d "tests" ]; then
            echo "Running unit tests..."
            pytest tests/ -v --tb=short || echo "⚠️ Some tests failed"
          else
            echo "⚠️ No tests directory found, skipping"
          fi
        continue-on-error: true

  e2e-execution:
    name: End-to-End Execution
    runs-on: [self-hosted, Linux, X64, darwin]
    needs: [lint, unit-tests]
    timeout-minutes: 60
    env:
      KUBECONFIG: ./.setup/kindkubeconfig.yaml

    steps:
      # --- SETUP ---
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          clean: false
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Setup cluster
        uses: ./.github/actions/setup-cluster
        with:
          kubeconfig_path: ./.setup/kindkubeconfig.yaml

      # --- DEPLOY ---
      - name: Initialize configuration
        run: |
          echo "📋 Running init.sh..."
          rm -f .setup/enabled-services.yaml
          printf "n\nn\nn\nn\nn\nn\nn\ny\ny\nn\nn\nn\nn\n" | ./init.sh --dev-mode
          cat .setup/enabled-services.yaml

      - name: Build and setup
        run: |
          echo "🔨 Running setup.sh..."
          ./setup.sh -y -d

      - name: Clean up previous deployment
        run: |
          echo "🧹 Cleaning up previous deployment state..."
          helm uninstall darwin -n darwin --ignore-not-found --wait || true
          kubectl delete job darwin-datastore-health-check -n darwin --ignore-not-found || true
          kubectl delete pods -n darwin -l app.kubernetes.io/component=datastore-health-check --ignore-not-found || true
          sleep 5
          echo "✅ Previous deployment cleaned up"

      - name: Deploy services
        run: |
          echo "🚀 Running start.sh to deploy services..."

          (
            while true; do
              sleep 30
              echo ""
              echo "⏳ [$(date +%H:%M:%S)] Deployment in progress... Showing current status:"
              echo "   Helm releases:"
              helm list -n darwin 2>/dev/null | head -3 || echo "      (no releases yet)"
              echo "   Pod status:"
              kubectl get pods -n darwin --no-headers 2>/dev/null | head -10 | awk '{print "      " $1 ": " $3}' || echo "      (no pods yet)"
              echo ""
            done
          ) &
          STATUS_MONITOR_PID=$!

          set +e
          ./start.sh 2>&1 | tee /tmp/start.sh.log
          START_EXIT_CODE=${PIPESTATUS[0]}
          set -e

          kill $STATUS_MONITOR_PID 2>/dev/null || true

          if [ $START_EXIT_CODE -ne 0 ]; then
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "❌ DEPLOYMENT FAILED - Diagnostics Report"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "=== start.sh output ==="
            cat /tmp/start.sh.log || true
            echo ""
            echo "=== Helm releases ==="
            helm list -n darwin || true
            echo ""
            echo "=== Helm release status ==="
            helm status darwin -n darwin || true
            echo ""
            echo "=== All pods in darwin namespace ==="
            kubectl get pods -n darwin -o wide || true
            echo ""
            echo "=== Non-Ready pods details ==="
            for pod in $(kubectl get pods -n darwin --field-selector=status.phase!=Running,status.phase!=Succeeded -o name 2>/dev/null); do
              echo ""
              echo "  ▸ $pod"
              kubectl describe $pod -n darwin 2>/dev/null | grep -A10 "Events:" | tail -10 | sed 's/^/    /'
            done
            echo ""
            echo "=== PVC Status ==="
            kubectl get pvc -n darwin 2>/dev/null || echo "  (no PVCs found)"
            echo ""
            echo "=== PV Status ==="
            kubectl get pv 2>/dev/null | grep -E "darwin|NAME" || echo "  (no darwin PVs found)"
            echo ""
            echo "=== Recent Events (last 30) ==="
            kubectl get events -n darwin --sort-by='.lastTimestamp' 2>/dev/null | tail -30 || echo "  (no events)"
            echo ""
            echo "=== Failed pod logs ==="
            for pod in $(kubectl get pods -n darwin --field-selector=status.phase!=Running,status.phase!=Succeeded -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
              echo ""
              echo "--- Logs for pod: $pod ---"
              kubectl logs -n darwin "$pod" --tail=50 2>/dev/null || echo "  (no logs available)"
            done
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          fi

          echo "✅ Deployment completed successfully"

      - name: Wait for darwin-workflow pod
        run: |
          echo "⏳ Waiting for darwin-workflow pod..."
          max_attempts=60
          attempt=0
          while [ $attempt -lt $max_attempts ]; do
            POD_STATUS=$(kubectl get pods -n darwin -l app.kubernetes.io/component=workflow -o jsonpath='{.items[0].status.phase}' 2>/dev/null || echo "NotFound")
            READY=$(kubectl get pods -n darwin -l app.kubernetes.io/component=workflow -o jsonpath='{.items[0].status.containerStatuses[0].ready}' 2>/dev/null || echo "false")
            
            if [ "$POD_STATUS" = "Running" ] && [ "$READY" = "true" ]; then
              echo "✅ darwin-workflow pod is ready"
              kubectl get pods -n darwin -l app.kubernetes.io/component=workflow
              break
            fi
            
            echo "Attempt $((attempt+1))/$max_attempts: Waiting... (Status: $POD_STATUS, Ready: $READY)"
            sleep 5
            attempt=$((attempt+1))
          done

          if [ $attempt -eq $max_attempts ]; then
            echo "❌ Pod not ready after $max_attempts attempts"
            kubectl get pods -n darwin
            exit 1
          fi

      - name: Verify healthcheck
        run: |
          echo "🏥 Testing Darwin Workflow healthcheck..."

          max_attempts=30
          attempt=0
          while [ $attempt -lt $max_attempts ]; do
            if kubectl get pods -n ingress-nginx 2>/dev/null | grep -q "Running"; then
              echo "✅ Ingress controller is ready"
              break
            fi
            sleep 2
            attempt=$((attempt+1))
          done

          HEALTH_URL="http://localhost/workflow/healthcheck"
          echo "Testing endpoint: $HEALTH_URL"

          max_attempts=30
          attempt=0
          while [ $attempt -lt $max_attempts ]; do
            if curl -f -s "$HEALTH_URL" > /dev/null 2>&1; then
              echo "✅ Health check endpoint is accessible"
              break
            fi
            echo "Attempt $((attempt+1))/$max_attempts: Waiting..."
            sleep 2
            attempt=$((attempt+1))
          done

          if [ $attempt -eq $max_attempts ]; then
            echo "❌ Health check not accessible"
            exit 1
          fi

          response=$(curl -s "$HEALTH_URL")
          echo "Response: $response"

          if echo "$response" | python3 -c "import sys, json; data = json.load(sys.stdin); sys.exit(0 if 'SUCCESS' in data.get('status', '') else 1)"; then
            echo "✅ Darwin Workflow health check passed!"
          else
            echo "❌ Invalid response - expected status containing SUCCESS"
            exit 1
          fi

      # --- INTEGRATION TESTS ---
      - name: Run integration tests
        run: |
          echo "🧪 Running integration tests..."
          # TODO: Add actual integration tests here
          echo "✅ Integration tests placeholder completed"

      # --- CLEANUP (always runs) ---
      - name: Cleanup
        if: always()
        uses: ./.github/actions/cleanup
        with:
          service_name: "darwin-workflow"
          delete_cluster: "false"
          delete_deployment: "true"
          prune_darwin_images: "true"
          prune_volumes: "false"
          prune_containers: "false"
          workspace_dir: ${{ github.workspace }}
