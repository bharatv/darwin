name: Infrastructure CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      # Infrastructure files
      - "init.sh"
      - "setup.sh"
      - "start.sh"
      - "services.yaml"
      - "service-dependencies.yaml"
      - "kind/**"
      - "deployer/**"
      - ".github/workflows/infrastructure-ci.yml"
      - ".github/ci-test-service/**"
      - ".github/actions/**"
      # Service files - infrastructure runs first for any service change
      - "ml-serve-app/**"
      - "artifact-builder/**"
      - "darwin-workflow/**"
      - "chronos/**"
      - "darwin-compute/**"
      - "darwin-cluster-manager/**"
      - "darwin-catalog/**"
      - "mlflow/**"
      - "workspace/**"
      - ".github/workflows/ml-serve-ci.yml"
      - ".github/workflows/artifact-builder-ci.yml"
      - ".github/workflows/workflow-ci.yml"
      - ".github/workflows/chronos-ci.yml"
      - ".github/workflows/compute-ci.yml"
      - ".github/workflows/mlflow-ci.yml"
      - ".github/workflows/workspace-ci.yml"
      - ".github/workflows/catalog-ci.yml"
      - ".github/workflows/darwin-cluster-manager-ci.yml"
  workflow_call: # Allow other workflows to call this
  workflow_dispatch: # Allow manual triggering

jobs:
  # ============================================================================
  # DETECT CHANGES - Determines which service CIs need to run
  # ============================================================================
  detect-changes:
    name: Detect Changed Files
    runs-on: ubuntu-latest
    outputs:
      ml_serve: ${{ steps.filter.outputs.ml_serve }}
      artifact_builder: ${{ steps.filter.outputs.artifact_builder }}
      workflow: ${{ steps.filter.outputs.workflow }}
      chronos: ${{ steps.filter.outputs.chronos }}
      compute: ${{ steps.filter.outputs.compute }}
      mlflow: ${{ steps.filter.outputs.mlflow }}
      workspace: ${{ steps.filter.outputs.workspace }}
      catalog: ${{ steps.filter.outputs.catalog }}
      cluster_manager: ${{ steps.filter.outputs.cluster_manager }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect file changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            infra:
              - init.sh
              - setup.sh
              - start.sh
              - services.yaml
              - service-dependencies.yaml
              - kind/**
              - deployer/**
              - .github/actions/**
              - .github/ci-test-service/**
            ml_serve:
              - ml-serve-app/**
              - .github/workflows/ml-serve-ci.yml
            artifact_builder:
              - artifact-builder/**
              - .github/workflows/artifact-builder-ci.yml
            workflow:
              - darwin-workflow/**
              - .github/workflows/workflow-ci.yml
            chronos:
              - chronos/**
              - .github/workflows/chronos-ci.yml
            compute:
              - darwin-compute/**
              - .github/workflows/compute-ci.yml
            mlflow:
              - mlflow/**
              - .github/workflows/mlflow-ci.yml
            workspace:
              - workspace/**
              - .github/workflows/workspace-ci.yml
            catalog:
              - darwin-catalog/**
              - .github/workflows/catalog-ci.yml
            cluster_manager:
              - darwin-cluster-manager/**
              - .github/workflows/darwin-cluster-manager-ci.yml

      - name: Log detected changes
        run: |
          echo "📋 Detected changes:"
          echo "   Infrastructure: ${{ steps.filter.outputs.infra }}"
          echo "   ML Serve App: ${{ steps.filter.outputs.ml_serve }}"
          echo "   Artifact Builder: ${{ steps.filter.outputs.artifact_builder }}"
          echo "   Workflow: ${{ steps.filter.outputs.workflow }}"
          echo "   Chronos: ${{ steps.filter.outputs.chronos }}"
          echo "   Compute: ${{ steps.filter.outputs.compute }}"
          echo "   MLflow: ${{ steps.filter.outputs.mlflow }}"
          echo "   Workspace: ${{ steps.filter.outputs.workspace }}"
          echo "   Catalog: ${{ steps.filter.outputs.catalog }}"
          echo "   Cluster Manager: ${{ steps.filter.outputs.cluster_manager }}"

  # ============================================================================
  # INFRASTRUCTURE VALIDATION
  # ============================================================================
  lint-scripts:
    name: Lint Shell Scripts
    runs-on: ubuntu-latest
    needs: [detect-changes]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Lint init.sh
        run: |
          echo "🔍 Linting init.sh..."
          # shellcheck -x init.sh || echo "⚠️ Shellcheck found issues in init.sh"
          echo "⚠️ Linting temporarily disabled - uncomment shellcheck command to enable"

      - name: Lint setup.sh
        run: |
          echo "🔍 Linting setup.sh..."
          # shellcheck -x setup.sh || echo "⚠️ Shellcheck found issues in setup.sh"
          echo "⚠️ Linting temporarily disabled - uncomment shellcheck command to enable"

      - name: Lint start.sh
        run: |
          echo "🔍 Linting start.sh..."
          # shellcheck -x start.sh || echo "⚠️ Shellcheck found issues in start.sh"
          echo "⚠️ Linting temporarily disabled - uncomment shellcheck command to enable"

      - name: Lint deployer scripts
        run: |
          echo "🔍 Linting deployer scripts..."
          # for script in deployer/scripts/*.sh; do
          #   echo "  Checking $script..."
          #   shellcheck -x "$script" || echo "⚠️ Shellcheck found issues in $script"
          # done
          echo "⚠️ Linting temporarily disabled - uncomment for loop to enable"

      - name: Lint Kind scripts
        run: |
          echo "🔍 Linting Kind scripts..."
          # for script in kind/*.sh; do
          #   echo "  Checking $script..."
          #   shellcheck -x "$script" || echo "⚠️ Shellcheck found issues in $script"
          # done
          echo "⚠️ Linting temporarily disabled - uncomment for loop to enable"

  validate-yaml:
    name: Validate YAML Files
    runs-on: ubuntu-latest
    needs: [detect-changes]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Validate services.yaml
        run: |
          echo "🔍 Validating services.yaml..."
          yq eval '.' services.yaml > /dev/null && echo "✅ services.yaml is valid YAML"

      - name: Validate service-dependencies.yaml
        run: |
          echo "🔍 Validating service-dependencies.yaml..."
          yq eval '.' service-dependencies.yaml > /dev/null && echo "✅ service-dependencies.yaml is valid YAML"

  cluster-test:
    name: Kind Cluster Test
    runs-on: [self-hosted, Linux, X64, darwin]
    needs: [detect-changes, lint-scripts, validate-yaml]
    timeout-minutes: 30
    env:
      KUBECONFIG: ./.setup/kindkubeconfig.yaml

    steps:
      - name: Runner identity (debug)
        run: |
          echo "Runner name: $RUNNER_NAME"
          echo "Runner OS: $RUNNER_OS"
          echo "Runner arch: $RUNNER_ARCH"
          hostname

      - name: Cleanup previous run artifacts
        run: |
          echo "🧹 Cleaning up previous run artifacts..."
          # Clean up kind cluster if it exists
          if command -v kind >/dev/null 2>&1; then
            if kind get clusters 2>/dev/null | grep -q kind; then
              echo "Deleting existing kind cluster..."
              kind delete cluster --name kind || true
            fi
          fi
          # Clean up workspace directories with permission issues
          WORKSPACE_DIR="${{ github.workspace }}"
          if [ -d "$WORKSPACE_DIR" ]; then
            if [ -d "$WORKSPACE_DIR/kind" ]; then
              echo "Cleaning up kind directory..."
              sudo chmod -R u+w "$WORKSPACE_DIR/kind" 2>/dev/null || true
              sudo rm -rf "$WORKSPACE_DIR/kind/shared-storage" 2>/dev/null || true
            fi
          fi
          echo "✅ Cleanup completed"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          clean: true
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install prerequisites
        run: |
          # Install kubectl if not present
          if ! command -v kubectl >/dev/null 2>&1; then
            KUBECTL_VERSION=$(curl -L -s https://dl.k8s.io/release/stable.txt)
            echo "Installing kubectl version: $KUBECTL_VERSION"
            curl -LO "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
            if ! file kubectl | grep -q "ELF\|executable"; then
              rm -f kubectl
              curl -LO "https://storage.googleapis.com/kubernetes-release/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
            fi
            chmod +x kubectl
            sudo mv kubectl /usr/local/bin/kubectl
          fi
          kubectl version --client

          # Install Helm if not present
          if ! command -v helm >/dev/null 2>&1; then
            curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          fi
          helm version

          # Install Kind if not present
          if ! command -v kind >/dev/null 2>&1; then
            curl -Lo /tmp/kind https://kind.sigs.k8s.io/dl/v0.20.0/kind-linux-amd64
            chmod +x /tmp/kind
            sudo mv /tmp/kind /usr/local/bin/kind
          fi
          kind version

          # Install yq if not present
          if ! command -v yq >/dev/null 2>&1; then
            sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
            sudo chmod +x /usr/local/bin/yq
          fi
          yq --version

      # =========================================================================
      # DARWIN DEPLOYMENT FLOW - Tests init.sh, setup.sh, start.sh
      # setup.sh handles Kind cluster creation when ENV=local
      # =========================================================================
      - name: Test init.sh
        run: |
          # Ensure yq is in the PATH and executable
          export PATH=$PATH:/usr/local/bin
          chmod +x ./init.sh

          # Define logic to compare YAMLs logically (ignoring comments/dates)
          compare_yaml_logic() {
              local expected="$1"
              local actual=".setup/enabled-services.yaml"
              local test_name="$2"

              echo "---------------------------------------------------"
              echo "🧪 Testing $test_name..."

              # Check if actual file was generated
              if [ ! -f "$actual" ]; then
                  echo "❌ FAIL: $test_name (Output file not generated)"
                  return 1
              fi

              # Compare JSON representations using yq
              # We put the diff inside the 'if' to handle the exit code gracefully
              if diff <(yq eval -o=json 'sort_keys(..)' "$expected") <(yq eval -o=json 'sort_keys(..)' "$actual") > /dev/null; then
                  echo "✅ PASS: $test_name"
                  return 0
              else
                  echo "❌ FAIL: $test_name mismatch"
                  echo "Diff (Expected < vs Actual >):"
                  diff <(yq eval -o=json 'sort_keys(..)' "$expected") <(yq eval -o=json 'sort_keys(..)' "$actual")
                  return 1
              fi
          }

          # 1. Test Inference Mode
          echo "Running Inference Mode Test..."
          rm -f .setup/enabled-services.yaml
          # Inputs: Training(n) -> Inference(y) -> Proceed(y) -> CLI(y)
          printf "n\ny\ny\ny\n" | ./init.sh
          
          compare_yaml_logic ".github/ci-configs/expected/inference-mode.yaml" "Inference Mode" || exit 1

          # 2. Test Training Mode
          echo "Running Training Mode Test..."
          rm -f .setup/enabled-services.yaml
          # Inputs: Training(y) -> Inference(n) -> Proceed(y) -> SDK(n) -> Ray:2.37(y) -> Ray:2.53(n) -> CLI(n)
          printf "y\nn\ny\nn\ny\nn\nn\n" | ./init.sh
          
          compare_yaml_logic ".github/ci-configs/expected/training-mode.yaml" "Training Mode" || exit 1

          # 3. Test Dev Mode (Serve)
          echo "Running Dev Mode (Serve) Test..."
          rm -f .setup/enabled-services.yaml
          # Inputs: No to everything except Serve(y), then Proceed(y), CLI(n)
          printf "n\nn\nn\nn\ny\nn\nn\nn\ny\nn\n" | ./init.sh --dev-mode
          
          compare_yaml_logic ".github/ci-configs/expected/dev-mode-serve.yaml" "Dev Mode (Serve)" || exit 1

          echo "✅ ALL INIT SCENARIOS PASSED"

      - name: Build and create cluster (setup.sh)
        run: |
          echo "🔨 Running setup.sh with --ci-test flag..."
          
          # setup.sh --ci-test:
          # - Creates Kind cluster when ENV=local
          # - Writes KUBECONFIG to .setup/config.env
          # - Uses .github/ci-configs/test-services.yaml for service definitions
          # - Uses .github/ci-configs/test-enabled-services.yaml for enabled services
          # - Builds ONLY ci-test-service image
          ./setup.sh -y -d --ci-test
          
          echo ""
          echo "Generated config.env:"
          cat .setup/config.env

      - name: Assert image built
        run: |
          echo "🔍 Asserting CI test service image was built..."
          
          # Verify image exists in local registry
          DOCKER_REGISTRY=$(docker port kind-registry 5000 | head -1 | sed 's/0.0.0.0/127.0.0.1/')
          echo "Registry: $DOCKER_REGISTRY"
          
          # Check if the image exists in the registry
          if docker pull $DOCKER_REGISTRY/ci-test-service:latest; then
            echo "✅ ci-test-service:latest exists in registry"
          else
            echo "❌ ci-test-service:latest NOT found in registry"
            echo "Available images:"
            docker images | grep ci-test || echo "(none)"
            exit 1
          fi

      - name: Deploy CI test service (start.sh)
        run: |
          echo "🚀 Deploying CI test service via start.sh with --ci-test flag..."

          # 1. Start a background process to monitor pods every 30 seconds
          (
            echo "📊 Starting background pod monitor..."
            while true; do
              sleep 30
              echo ""
              echo "⏳ [$(date +%H:%M:%S)] Deployment still in progress... Current Pod Status:"
              
              # Show all pods in darwin namespace
              # Columns: NAME, READY, STATUS, RESTARTS, AGE
              kubectl get pods -n darwin --no-headers 2>/dev/null | awk '{print "      " $1 "  " $2 "  " $3 "  (Restarts: " $4 ")"}' || echo "      (No pods created yet)"
              
              # If any pod is not Running/Completed, show a warning
              NOT_READY=$(kubectl get pods -n darwin --field-selector=status.phase!=Running,status.phase!=Succeeded 2>/dev/null)
              if [ ! -z "$NOT_READY" ]; then
                echo "      ⚠️  Waiting for pods to become ready..."
              fi
              echo ""
            done
          ) &
          MONITOR_PID=$!

          # 2. Run the actual deployment command
          # We use 'set +e' to capture the exit code manually, ensuring we kill the monitor
          set +e
          ./start.sh --ci-test 2>&1 | tee /tmp/start_deploy.log
          DEPLOY_EXIT_CODE=${PIPESTATUS[0]}
          set -e

          # 3. Kill the background monitor immediately after start.sh finishes
          kill $MONITOR_PID 2>/dev/null || true
          
          echo "✅ Deployment process finished with exit code $DEPLOY_EXIT_CODE"

          # 4. Fail the step if start.sh failed
          if [ $DEPLOY_EXIT_CODE -ne 0 ]; then
            echo "❌ Deployment Failed. Final Pod Status:"
            kubectl get pods -n darwin -o wide
            echo ""
            echo "=== Recent Events ==="
            kubectl get events -n darwin --sort-by='.lastTimestamp' | tail -n 15
            exit 1
          fi

      - name: Assert pod running
        run: |
          echo "🔍 Asserting CI test service pod is running..."
          
          # Wait for pod to be ready
          max_attempts=30
          attempt=0
          while [ $attempt -lt $max_attempts ]; do
            POD_STATUS=$(kubectl get pods -n darwin -l app.kubernetes.io/component=ci-test-service -o jsonpath='{.items[0].status.phase}' 2>/dev/null || echo "NotFound")
            READY=$(kubectl get pods -n darwin -l app.kubernetes.io/component=ci-test-service -o jsonpath='{.items[0].status.containerStatuses[0].ready}' 2>/dev/null || echo "false")
            
            if [ "$POD_STATUS" = "Running" ] && [ "$READY" = "true" ]; then
              echo "✅ ci-test-service pod is Running and Ready"
              kubectl get pods -n darwin -l app.kubernetes.io/component=ci-test-service
              break
            fi
            
            echo "Attempt $((attempt+1))/$max_attempts: Status=$POD_STATUS, Ready=$READY"
            sleep 5
            attempt=$((attempt+1))
          done
          
          if [ $attempt -eq $max_attempts ]; then
            echo "❌ ci-test-service pod not ready after $max_attempts attempts"
            kubectl get pods -n darwin
            kubectl describe pod -n darwin -l app.kubernetes.io/component=ci-test-service || true
            exit 1
          fi

      - name: Assert environment variables
        run: |
          echo "🔍 Asserting environment variables are set correctly..."
          
          POD_NAME=$(kubectl get pods -n darwin -l app.kubernetes.io/component=ci-test-service -o jsonpath='{.items[0].metadata.name}')
          echo "Pod name: $POD_NAME"
          
          # Verify expected env vars are set (from helm values.yaml)
          kubectl exec -n darwin $POD_NAME -- env | grep -E "^ENV=|^ROOT_PATH=" || true
          
          if kubectl exec -n darwin $POD_NAME -- env | grep -q "ENV="; then
            echo "✅ ENV variable is set"
          else
            echo "⚠️ ENV variable not found (may use default)"
          fi
          
          echo "✅ Environment variables assertion completed"

      - name: Verify healthcheck via ingress
        run: |
          echo "🏥 Testing CI test service healthcheck via ingress..."
          
          # Wait for ingress controller to be ready
          echo "Waiting for ingress controller..."
          max_attempts=30
          attempt=0
          while [ $attempt -lt $max_attempts ]; do
            if kubectl get pods -n ingress-nginx 2>/dev/null | grep -q "Running"; then
              echo "✅ Ingress controller is ready"
              break
            fi
            echo "Attempt $((attempt+1))/$max_attempts: Waiting for ingress..."
            sleep 2
            attempt=$((attempt+1))
          done

          # Test healthcheck via ingress path (defined in values.yaml)
          HEALTH_URL="http://localhost/ci-test/healthcheck"
          echo "Testing: $HEALTH_URL"
          
          max_attempts=30
          attempt=0
          while [ $attempt -lt $max_attempts ]; do
            if curl -f -s "$HEALTH_URL" > /dev/null 2>&1; then
              echo "✅ Health check endpoint is accessible"
              break
            fi
            echo "Attempt $((attempt+1))/$max_attempts: Waiting for healthcheck..."
            sleep 2
            attempt=$((attempt+1))
          done

          if [ $attempt -eq $max_attempts ]; then
            echo "❌ Healthcheck not accessible via ingress"
            echo "Checking ingress status:"
            kubectl get ingress -n darwin || true
            kubectl describe ingress -n darwin || true
            exit 1
          fi

          # Verify response
          response=$(curl -s "$HEALTH_URL")
          echo "Response: $response"

          if echo "$response" | grep -q '"status":"SUCCESS"'; then
            echo "✅ Infrastructure CI validation passed!"
          else
            echo "❌ Unexpected response - expected status: SUCCESS"
            exit 1
          fi

      - name: Cleanup CI test service (helm uninstall)
        run: |
          echo "🧹 Cleaning up CI test service via Helm..."
          
          # Cleanup via helm (proper Darwin way)
          helm uninstall darwin -n darwin --ignore-not-found || true
          
          echo "✅ Helm release uninstalled"

      - name: Cleanup
        if: always()
        run: |
          echo "🧹 Running cleanup..."

          # Ensure helm release is uninstalled (in case previous step failed)
          helm uninstall darwin -n darwin --ignore-not-found 2>/dev/null || true

          # Clean up ONLY ci-test-service images (not all Darwin images)
          # This prevents race conditions with parallel service CIs
          echo "Cleaning up ci-test-service images only..."
          docker rmi -f ci-test-service:latest 2>/dev/null || true
          docker rmi -f localhost:5000/ci-test-service:latest 2>/dev/null || true
          # Also remove any dynamically tagged images (127.0.0.1:<port>/ci-test-service)
          docker images --format '{{.Repository}}:{{.Tag}}' | grep "127.0.0.1.*ci-test-service" | xargs -r docker rmi -f 2>/dev/null || true

          # Do NOT delete Kind cluster here - service CIs will use it
          # Do NOT prune all Darwin images - service CIs need them
          # Do NOT prune volumes/containers - final-cleanup.yml handles that
          echo "📋 Note: Cluster kept for service CIs. Full cleanup runs in final-cleanup.yml"

          echo "✅ Cleanup completed"
          echo ""
          echo "Disk usage after cleanup:"
          df -h

  # ============================================================================
  # SERVICE CIs - Called only if their files changed AND infrastructure passed
  # ============================================================================
  ml-serve-ci:
    name: ML Serve App CI
    needs: [detect-changes, cluster-test]
    if: needs.detect-changes.outputs.ml_serve == 'true'
    uses: ./.github/workflows/ml-serve-ci.yml
    secrets: inherit

  artifact-builder-ci:
    name: Artifact Builder CI
    needs: [detect-changes, cluster-test]
    if: needs.detect-changes.outputs.artifact_builder == 'true'
    uses: ./.github/workflows/artifact-builder-ci.yml
    secrets: inherit

  workflow-ci:
    name: Darwin Workflow CI
    needs: [detect-changes, cluster-test]
    if: needs.detect-changes.outputs.workflow == 'true'
    uses: ./.github/workflows/workflow-ci.yml
    secrets: inherit

  chronos-ci:
    name: Darwin Chronos CI
    needs: [detect-changes, cluster-test]
    if: needs.detect-changes.outputs.chronos == 'true'
    uses: ./.github/workflows/chronos-ci.yml
    secrets: inherit

  compute-ci:
    name: Darwin Compute CI
    needs: [detect-changes, cluster-test]
    if: needs.detect-changes.outputs.compute == 'true'
    uses: ./.github/workflows/compute-ci.yml
    secrets: inherit

  darwin-mlflow-ci:
    name: Darwin MLflow CI
    needs: [detect-changes, cluster-test]
    if: needs.detect-changes.outputs.mlflow == 'true'
    uses: ./.github/workflows/mlflow-ci.yml
    secrets: inherit

  workspace-ci:
    name: Darwin Workspace CI
    needs: [detect-changes, cluster-test]
    if: needs.detect-changes.outputs.workspace == 'true'
    uses: ./.github/workflows/workspace-ci.yml
    secrets: inherit

  catalog-ci:
    name: Darwin Catalog CI
    needs: [detect-changes, cluster-test]
    if: needs.detect-changes.outputs.catalog == 'true'
    uses: ./.github/workflows/catalog-ci.yml
    secrets: inherit

  cluster-manager-ci:
    name: Darwin Cluster Manager CI
    needs: [detect-changes, cluster-test]
    if: needs.detect-changes.outputs.cluster_manager == 'true'
    uses: ./.github/workflows/darwin-cluster-manager-ci.yml
    secrets: inherit

  # ============================================================================
  # FINAL CLEANUP - Runs after all CIs complete (even if they fail)
  # ============================================================================
  final-cleanup:
    name: Final Cleanup
    needs:
      - cluster-test
      - ml-serve-ci
      - artifact-builder-ci
      - workflow-ci
      - chronos-ci
      - compute-ci
      - darwin-mlflow-ci
      - workspace-ci
      - catalog-ci
      - cluster-manager-ci
    if: always() # Run even if any previous job failed or was skipped
    uses: ./.github/workflows/final-cleanup.yml
    secrets: inherit
