# Default values for ray-cluster.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# The KubeRay community welcomes PRs to expose additional configuration
# in this Helm chart.

image:
  repository: localhost:5000/ray
  tag: 2.37.0
  pullPolicy: IfNotPresent

# -- String to partially override release name.
nameOverride: "kuberay"

# -- String to fully override release name.
fullnameOverride: ""

# -- Secrets with credentials to pull images from a private registry
imagePullSecrets: []
  # - name: an-existing-secret

# gcsFaultTolerance specifies configuration for GCS fault tolerance.
# See https://docs.ray.io/en/latest/cluster/kubernetes/user-guides/kuberay-gcs-ft.html#kuberay-gcs-ft
# for more details.
gcsFaultTolerance:
  enabled: false
  # In most cases, you don't need to set `externalStorageNamespace` because KubeRay will
  # automatically set it to the UID of RayCluster. Only modify this annotation if you fully understand
  # the behaviors of the Ray GCS FT and RayService to avoid misconfiguration.
  # externalStorageNamespace: "my-raycluster-storage"
  # redisAddress: "redis:6379"
  # redisPassword:
    # Reference to a secret key containing the Redis password
    # Secret must be manually created in the namespace
    # valueFrom:
    #   secretKeyRef:
    #       name: redis-password-secret
    #       key: password
  # redisUsername:
    # Reference to a secret key containing the Redis username
    # Secret must be manually created in the namespace
    # valueFrom:
    #   secretKeyRef:
    #     name: redis-username-secret
    #     key: username


# common defined values shared between the head and worker
common:
  # -- containerEnv specifies environment variables for the Ray head and worker containers.
  # Follows standard K8s container env schema.
  containerEnv:
    - name: SPARK_CONF_DIR
      value: /tmp/script
    - name: TERMINATE_AFTER
      value: "60"
    - name: CLUSTER_NAME
      value: id-test
    - name: CLUSTER_ID
      value: id-test
    - name: INIT_SCRIPT_API
      value: http://darwin-compute.darwin.svc.cluster.local:8000/init-script-status
    - name: RAY_PROMETHEUS_HOST
      value: http://id-test-prometheus.prometheus.svc.cluster.local:9090
    - name: RAY_GRAFANA_HOST
      value: http://id-test-grafana.prometheus.svc.cluster.local:3000
    - name: RAY_GRAFANA_IFRAME_HOST
      value: https://localhost/kind-0/id-test-metrics
    - name: ENV
      value: id-test
    - name: CREATED_BY
      value: darwin@dream11.com
    - name: CLOUD
      value: AWS
    - name: RSS
      value: "False"

head:
  # rayVersion determines the autoscaler's image version.
  # It should match the Ray version in the image of the containers.
  # rayVersion: 2.46.0

  # If enableInTreeAutoscaling is true, the autoscaler sidecar will be added to the Ray head pod.
  # Ray autoscaler integration is supported only for Ray versions >= 1.11.0
  # Ray autoscaler integration is Beta with KubeRay >= 0.3.0 and Ray >= 2.0.0.
  enableInTreeAutoscaling: true

  # autoscalerOptions is an OPTIONAL field specifying configuration overrides for the Ray autoscaler.
  # The example configuration shown below represents the DEFAULT values.
  # autoscalerOptions:
    # upscalingMode: Default
    # idleTimeoutSeconds is the number of seconds to wait before scaling down a worker pod which is not using Ray resources.
    # idleTimeoutSeconds: 60
    # imagePullPolicy optionally overrides the autoscaler container's default image pull policy (IfNotPresent).
    # imagePullPolicy: IfNotPresent
    # Optionally specify the autoscaler container's securityContext.
    # securityContext: {}
    # env: []
    # envFrom: []
    # resources specifies optional resource request and limit overrides for the autoscaler container.
    # For large Ray clusters, we recommend monitoring container resource usage to determine if overriding the defaults is required.
    # resources:
    #   limits:
    #     cpu: "500m"
    #     memory: "512Mi"
    #   requests:
    #     cpu: "500m"
    #     memory: "512Mi"

  # -- Init containers to add to the head pod
  initContainers: []
  # -- Labels for the head pod
  labels: {}

  # Note: From KubeRay v0.6.0, users need to create the ServiceAccount by themselves if they specify the `serviceAccountName`
  # in the headGroupSpec. See https://github.com/ray-project/kuberay/pull/1128 for more details.
  serviceAccountName: "darwin-ds-role"
  restartPolicy: ""

  # containerEnv specifies environment variables for the Ray container,
  # Follows standard K8s container env schema.
  containerEnv:
    - name: TYPE
      value: head
    - name: SHELL
      value: /bin/bash
    - name: MY_POD_IP
      valueFrom:
        fieldRef:
          fieldPath: status.podIP
  # - name: EXAMPLE_ENV
  #   value: "1"

  # -- envFrom to pass to head pod
  envFrom:
    - secretRef:
        name: secret-manager-token
        optional: true
    # - secretRef:
    #     name: my-env-secret

  # ports optionally allows specifying ports for the Ray container.
  ports:
    - containerPort: 6379
      name: gcs
    - containerPort: 8265
      name: dashboard
    - containerPort: 10001
      name: client
    - containerPort: 8000
      name: serve
    - containerPort: 8888
      name: jupyter
    - containerPort: 8080
      name: metrics
    - containerPort: 4040
      name: sparkui
    - containerPort: 3000
      name: vscode
    - containerPort: 8998
      name: livy
    - containerPort: 10000
      name: thrift
    - containerPort: 8001
      name: custom-1
    - containerPort: 8002
      name: custom-2
    - containerPort: 8003
      name: custom-3
  # resource requests and limits for the Ray head container.
  # Modify as needed for your application.
  # Note that the resources in this example are much too small for production;
  # we don't recommend allocating less than 8G memory for a Ray pod in production.
  # Ray pods should be sized to take up entire K8s nodes when possible.
  # Always set CPU and memory limits for Ray pods.
  # It is usually best to set requests equal to limits.
  # See https://docs.ray.io/en/latest/cluster/kubernetes/user-guides/config.html#resources
  # for further guidance.
  resources:
    limits:
      cpu: "2"
      # To avoid out-of-memory issues, never allocate less than 2G memory for the Ray head.
      memory: "4G"
    requests:
      cpu: "2"
      memory: "4G"

  # -- Extra annotations for head pod
  annotations: {}

  # -- Node labels for head pod assignment
  nodeSelector: {}

  # -- Node tolerations for head pod scheduling to nodes with taints
  tolerations: []

  # -- Head pod affinity
  affinity: {}

  # -- Head pod security context.
  podSecurityContext: {}

  # -- Ray container security context.
  securityContext:
    runAsGroup: 100
    runAsUser: 1000
    capabilities:
      add:
        - SYS_PTRACE

  # Optional: The following volumes/volumeMounts configurations are optional but recommended because
  # Ray writes logs to /tmp/ray/session_latests/logs instead of stdout/stderr.
  volumes:
    - name: log-volume
      emptyDir: {}
    - name: id-test-scripts-vol
      configMap:
        name: id-test-script
        defaultMode: 511
    - name: id-test-remote-command-vol
      configMap:
        name: id-test-remote-command
        defaultMode: 0777
    - name: persistent-storage
      persistentVolumeClaim:
        claimName: fsx-claim-0
  volumeMounts:
    - mountPath: /tmp/ray
      name: log-volume
    - mountPath: /tmp/script
      name: id-test-scripts-vol
    - mountPath: /tmp/remote-command
      name: id-test-remote-command-vol
    - mountPath: /home/ray/fsx
      name: persistent-storage 
  # sidecarContainers specifies additional containers to attach to the Ray pod.
  # Follows standard K8s container spec.
  sidecarContainers: []

  # See docs/guidance/pod-command.md for more details about how to specify
  # container command for head Pod.
  command: []
  args:
    - "/tmp/script/head.sh"

  # Optional, for the user to provide any additional fields to the service.
  # See https://pkg.go.dev/k8s.io/Kubernetes/pkg/api/v1#Service
  headService: {}
    # metadata:
    #   annotations:
    #     prometheus.io/scrape: "true"

  # Custom pod DNS configuration
  # See https://kubernetes.io/docs/concepts/services-networking/dns-pod-service/#pod-dns-config
  # dnsConfig:
  #   nameservers:
  #     - 8.8.8.8
  #   searches:
  #     - example.local
  #   options:
  #     - name: ndots
  #       value: "2"
  #     - name: edns0
  topologySpreadConstraints: []

  # https://docs.ray.io/en/latest/cluster/kubernetes/user-guides/configuring-autoscaling.html#set-the-raystartparams-and-the-resource-limits-for-the-ray-container
  rayStartParams:
    port: "6379"
    dashboard-host: "0.0.0.0"
    num-cpus: "0"  # can be auto-completed from the limits
    node-ip-address: $MY_POD_IP  # auto-completed as the head pod IP
    block: "true"
    metrics-export-port: "8080"
    redis-password: ""

worker:
  # If you want to disable the default workergroup
  # uncomment the line below
  # disabled: true

  # -- The name of the workergroup
  groupName: wg

  # -- The number of replicas for the worker pod
  replicas: 1

  # -- The minimum number of replicas for the worker pod
  minReplicas: 1

  # -- The maximum number of replicas for the worker pod
  maxReplicas: 3

  # -- Labels for the worker pod
  labels: {}
  serviceAccountName: "darwin-ds-role"
  restartPolicy: ""

  # -- Init containers to add to the worker pod
  initContainers: []

  # containerEnv specifies environment variables for the Ray container,
  # Follows standard K8s container env schema.
  containerEnv:
    - name: TYPE
      value: worker
    - name: RAY_DISABLE_DOCKER_CPU_WARNING
      value: "1"
    - name: MY_POD_NAME
      valueFrom:
        fieldRef:
          fieldPath: metadata.name
    - name: MY_POD_IP
      valueFrom:
        fieldRef:
          fieldPath: status.podIP
    - name: CPU_REQUEST
      valueFrom:
        resourceFieldRef:
          containerName: ray-worker
          resource: requests.cpu

  # -- envFrom to pass to worker pod
  envFrom:
    - secretRef:
        name: secret-manager-token
        optional: true
    # - secretRef:
    #     name: my-env-secret

  # ports optionally allows specifying ports for the Ray container.
  ports:
    - containerPort: 8080
      name: metrics

  # resource requests and limits for the Ray head container.
  # Modify as needed for your application.
  # Note that the resources in this example are much too small for production;
  # we don't recommend allocating less than 8G memory for a Ray pod in production.
  # Ray pods should be sized to take up entire K8s nodes when possible.
  # Always set CPU and memory limits for Ray pods.
  # It is usually best to set requests equal to limits.
  # See https://docs.ray.io/en/latest/cluster/kubernetes/user-guides/config.html#resources
  # for further guidance.
  resources:
    limits:
      cpu: "1"
      memory: "1G"
    requests:
      cpu: "1"
      memory: "1G"

  # -- Extra annotations for worker pod
  annotations: {}

  # -- Node labels for worker pod assignment
  nodeSelector: {}

  # -- Node tolerations for worker pod scheduling to nodes with taints
  tolerations: []

  # -- Worker pod affinity
  affinity: {}

  # -- Worker pod security context.
  podSecurityContext: {}

  # -- Ray container security context.
  securityContext:
    capabilities:
      add:
        - SYS_PTRACE

  # Optional: The following volumes/volumeMounts configurations are optional but recommended because
  # Ray writes logs to /tmp/ray/session_latests/logs instead of stdout/stderr.
  volumes:
    - name: log-volume
      emptyDir: {}
    - name: id-test-scripts-vol
      configMap:
        name: id-test-script
        defaultMode: 0777
    - name: id-test-remote-command-vol
      configMap:
        name: id-test-remote-command
        defaultMode: 0777
  volumeMounts:
    - mountPath: /tmp/ray
      name: log-volume
    - mountPath: /tmp/script
      name: id-test-scripts-vol
    - mountPath: /tmp/remote-command
      name: id-test-remote-command-vol
  # sidecarContainers specifies additional containers to attach to the Ray pod.
  # Follows standard K8s container spec.
  sidecarContainers: []

  # See docs/guidance/pod-command.md for more details about how to specify
  # container command for worker Pod.
  command: []
  args:
    - "/tmp/script/worker.sh"
  topologySpreadConstraints: []

  # https://docs.ray.io/en/latest/cluster/kubernetes/user-guides/configuring-autoscaling.html#set-the-raystartparams-and-the-resource-limits-for-the-ray-container
  rayStartParams:
    node-ip-address: $MY_POD_IP
    redis-password: LetMeInRay
    block: "true"
    metrics-export-port: "8080"
    resources: '"{\"ondemand\": 100}"'

  # Custom pod DNS configuration
  # See https://kubernetes.io/docs/concepts/services-networking/dns-pod-service/#pod-dns-config
  # dnsConfig:
  #   nameservers:
  #     - 8.8.8.8
  #   searches:
  #     - example.local
  #   options:
  #     - name: ndots
  #       value: "2"
  #     - name: edns0

# The map's key is used as the groupName.
# For example, key:small-group in the map below
# will be used as the groupName
additionalWorkerGroups:
  smallGroup:
    # Disabled by default
    disabled: true

    # -- The number of replicas for the additional worker pod
    replicas: 0

    # -- The minimum number of replicas for the additional worker pod
    minReplicas: 0

    # -- The maximum number of replicas for the additional worker pod
    maxReplicas: 3

    # -- Labels for the additional worker pod
    labels: {}
    serviceAccountName: "darwin-ds-role"
    restartPolicy: ""

    # containerEnv specifies environment variables for the Ray container,
    # Follows standard K8s container env schema.
    containerEnv:
      - name: TYPE
        value: worker
      - name: RAY_DISABLE_DOCKER_CPU_WARNING
        value: "1"
      - name: MY_POD_IP
        valueFrom:
          fieldRef:
            fieldPath: status.podIP
      - name: MY_POD_NAME
        valueFrom:
          fieldRef:
            fieldPath: metadata.name
      - name: CPU_REQUEST
        valueFrom:
          resourceFieldRef:
            containerName: ray-worker
            resource: requests.cpu

    # -- envFrom to pass to additional worker pod
    envFrom:
      - secretRef:
          name: secret-manager-token
          optional: true
      # - secretRef:
      #     name: my-env-secret

    # ports optionally allows specifying ports for the Ray container.
    ports:
      - containerPort: 8080
        name: metrics

    # resource requests and limits for the Ray head container.
    # Modify as needed for your application.
    # Note that the resources in this example are much too small for production;
    # we don't recommend allocating less than 8G memory for a Ray pod in production.
    # Ray pods should be sized to take up entire K8s nodes when possible.
    # Always set CPU and memory limits for Ray pods.
    # It is usually best to set requests equal to limits.
    # See https://docs.ray.io/en/latest/cluster/kubernetes/user-guides/config.html#resources
    # for further guidance.
    resources:
      limits:
        cpu: 1
        memory: "1G"
      requests:
        cpu: 1
        memory: "1G"

    # -- Extra annotations for additional worker pod
    annotations: {}

    # -- Node labels for additional worker pod assignment
    nodeSelector: {}

    # -- Node tolerations for additional worker pod scheduling to nodes with taints
    tolerations: []

    # -- Additional worker pod affinity
    affinity: {}

    # -- Additional worker pod security context.
    podSecurityContext: {}

    # -- Ray container security context.
    securityContext:
      capabilities:
        add:
          - SYS_PTRACE

    # Optional: The following volumes/volumeMounts configurations are optional but recommended because
    # Ray writes logs to /tmp/ray/session_latests/logs instead of stdout/stderr.
    volumes:
      - name: log-volume
        emptyDir: {}
      - name: id-test-scripts-vol
        configMap:
          name: id-test-script
          defaultMode: 511
      - name: id-test-remote-command-vol
        configMap:
          name: id-test-remote-command
          defaultMode: 0777
    volumeMounts:
      - mountPath: /tmp/ray
        name: log-volume
      - mountPath: /tmp/script
        name: id-test-scripts-vol
      - mountPath: /tmp/remote-command
        name: id-test-remote-command-vol

    sidecarContainers: []

    # See docs/guidance/pod-command.md for more details about how to specify
    # container command for worker Pod.
    command: []
    args:
      - "/tmp/script/worker.sh"

    # Topology Spread Constraints for worker pods
    # See: https://kubernetes.io/docs/concepts/scheduling-eviction/topology-spread-constraints/
    topologySpreadConstraints: []

    # Custom pod DNS configuration
    # See https://kubernetes.io/docs/concepts/services-networking/dns-pod-service/#pod-dns-config
    # dnsConfig:
    #   nameservers:
    #     - 8.8.8.8
    #   searches:
    #     - example.local
    #   options:
    #     - name: ndots
    #       value: "2"
    #     - name: edns0

    # https://docs.ray.io/en/latest/cluster/kubernetes/user-guides/configuring-autoscaling.html#set-the-raystartparams-and-the-resource-limits-for-the-ray-container
    rayStartParams:
      node-ip-address: $MY_POD_IP
      redis-password: LetMeInRay
      block: "true"
      metrics-export-port: "8080"
      resources: '"{\"spot\": 200}"'


# Configuration for Head's Kubernetes Service
service:
  # This is optional, and the default is ClusterIP.
  type: ClusterIP

grafana:
  image: "localhost:5000/grafana:latest"
  rootPath: "/kind-0/id-test-metrics/"
  domain: localhost
  nodeSelector: {}

prometheus:
  replicas: 1
  nodeSelector: {}
  remoteWrite:
    - url: "http://darwin-thanos:10908/api/v1/receive"

sparkConfig:
  spark.ui.proxyBase: "/kind-0/id-test-sparkui"
  spark.ui.proxyRedirectUri: "/"
  spark.metrics.conf.*.sink.prometheusServlet.class: org.apache.spark.metrics.sink.PrometheusServlet
  spark.metrics.conf.*.sink.prometheusServlet.path: "/metrics/prometheus"
  spark.metrics.conf.master.sink.prometheusServlet.path: "/metrics/master/prometheus"
  spark.metrics.conf.applications.sink.prometheusServlet.path: "/metrics/applications/prometheus"
  spark.ui.prometheus.enabled: "true"

remoteCommand:
  statusReportApi: "http://darwin-compute.darwin.svc.cluster.local:8000/cluster/command/pod/status"
  statusReportInterval: 10
  logsS3Bucket: "darwin"
  logsS3Key: "mlp/logs/remote-command"
  commands:
    head: []
    worker: []

commands: []

# User name and email of the user who is provisioning the cluster
user: darwin
email: darwin@darwin.com

# Cluster Details
cluster_name: test-cluster
cluster_type: all_purpose_cluster # all_purpose_cluster, job_cluster

# Key of the kube cluster in the browser URL
kube_cluster_key: kind-0

labels:
  project: darwin
  service: darwin
  squad: darwin
  environment: local
  custom-1: custom1
