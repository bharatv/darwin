{{- if eq .Values.deployment.strategy "argo-rollouts" -}}
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ template "service-deployment.fullname" . }}
  namespace: {{ .Release.Namespace }}
  annotations:
    {{- range $key, $value := .Values.podAnnotations }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
  labels:
    {{- include "service-deployment.labels" . | nindent 4 }}
spec:
  {{- if not .Values.hpa.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      {{- include "service-deployment.selectorLabels" . | nindent 6 }}
  
  {{- if eq .Values.deployment.rollouts.strategy "canary" }}
  strategy:
    canary:
      {{- if .Values.deployment.rollouts.canary.steps }}
      steps:
      {{- range .Values.deployment.rollouts.canary.steps }}
        {{- if .setWeight }}
        - setWeight: {{ .setWeight }}
        {{- else if .pause }}
        - pause:
            {{- if .pause.duration }}
            duration: {{ .pause.duration }}
            {{- end }}
        {{- end }}
      {{- end }}
      {{- end }}
      
      # Service references for canary
      stableService: {{ include "service-deployment.stableServiceName" . }}
      canaryService: {{ include "service-deployment.canaryServiceName" . }}
      
      # Traffic routing configuration
      trafficRouting:
        {{- if eq .Values.deployment.rollouts.trafficRouting.provider "alb" }}
        alb:
          {{- $fullName := include "service-deployment.fullname" . -}}
          {{- $rootService := include "service-deployment.rootServiceName" . -}}
          {{- $servicePort := .Values.deployment.rollouts.trafficRouting.servicePort | default 80 -}}
          {{- if .Values.deployment.rollouts.trafficRouting.rootService }}
          rootService: {{ .Values.deployment.rollouts.trafficRouting.rootService }}
          {{- else }}
          rootService: {{ $rootService }}
          {{- end }}
          servicePort: {{ $servicePort }}
          {{- if .Values.deployment.rollouts.trafficRouting.annotationPrefix }}
          annotationPrefix: {{ .Values.deployment.rollouts.trafficRouting.annotationPrefix }}
          {{- end }}
          # List of ingresses to manage (both internal and external if enabled)
          ingresses:
            {{- if .Values.ingressInt.enabled }}
            - {{ $fullName }}-{{ .Release.Namespace }}-internal
            {{- end }}
            {{- if .Values.ingressExt.enabled }}
            - {{ $fullName }}-{{ .Release.Namespace }}-external
            {{- end }}
        {{- else if eq .Values.deployment.rollouts.trafficRouting.provider "nginx" }}
        nginx:
          stableIngresses:
            {{- $fullName := include "service-deployment.fullname" . -}}
            {{- if .Values.ingressInt.enabled }}
            - {{ $fullName }}-{{ .Release.Namespace }}-internal
            {{- end }}
            {{- if .Values.ingressExt.enabled }}
            - {{ $fullName }}-{{ .Release.Namespace }}-external
            {{- end }}
        {{- end }}
      
      {{- if and .Values.deployment.rollouts.canary.analysis .Values.deployment.rollouts.canary.analysis.enabled }}
      # Analysis configuration (optional)
      analysis:
        templates:
        {{- range .Values.deployment.rollouts.canary.analysis.templates }}
        - templateName: {{ .templateName }}
          {{- if .clusterScope }}
          clusterScope: {{ .clusterScope }}
          {{- end }}
        {{- end }}
        {{- if .Values.deployment.rollouts.canary.analysis.startingStep }}
        startingStep: {{ .Values.deployment.rollouts.canary.analysis.startingStep }}
        {{- end }}
      {{- end }}
  {{- else if eq .Values.deployment.rollouts.strategy "blueGreen" }}
  strategy:
    blueGreen:
      # Service references for blue/green
      activeService: {{ include "service-deployment.activeServiceName" . }}
      previewService: {{ include "service-deployment.previewServiceName" . }}
      
      # Promotion behavior
      autoPromotionEnabled: {{ .Values.deployment.rollouts.blueGreen.autoPromotionEnabled | default false }}
      
      {{- if .Values.deployment.rollouts.blueGreen.autoPromotionSeconds }}
      autoPromotionSeconds: {{ .Values.deployment.rollouts.blueGreen.autoPromotionSeconds }}
      {{- end }}
      
      {{- if .Values.deployment.rollouts.blueGreen.scaleDownDelaySeconds }}
      scaleDownDelaySeconds: {{ .Values.deployment.rollouts.blueGreen.scaleDownDelaySeconds }}
      {{- end }}
      
      {{- if .Values.deployment.rollouts.blueGreen.scaleDownDelayRevisionLimit }}
      scaleDownDelayRevisionLimit: {{ .Values.deployment.rollouts.blueGreen.scaleDownDelayRevisionLimit }}
      {{- end }}
      
      {{- if and .Values.deployment.rollouts.blueGreen.analysis .Values.deployment.rollouts.blueGreen.analysis.enabled }}
      # Analysis configuration (optional)
      prePromotionAnalysis:
        templates:
        {{- range .Values.deployment.rollouts.blueGreen.analysis.templates }}
        - templateName: {{ .templateName }}
          {{- if .clusterScope }}
          clusterScope: {{ .clusterScope }}
          {{- end }}
        {{- end }}
      {{- end }}
  {{- end }}
  
  # Pod template (same structure as Deployment)
  template:
    metadata:
      creationTimestamp: null
      labels:
        {{- include "service-deployment.selectorLabels" . | nindent 8 }}
        {{- if eq .Values.deployment.rollouts.strategy "canary" }}
        role: canary-rollout
        {{- else if eq .Values.deployment.rollouts.strategy "blueGreen" }}
        role: bluegreen-rollout
        {{- end }}
        {{- include "service-deployment.labels" . | nindent 8 }}
      annotations:
        {{- include "service-deployment.podAnnotations" . | nindent 8 }}
        {{- range $key, $value := .Values.podAnnotations }}
        {{ $key }}: {{ $value | quote }}
        {{- end }}
    spec:
      {{- if .Values.topologySpreadConstraints }}
      topologySpreadConstraints: {{.Values.topologySpreadConstraints | toYaml | nindent 8 }}
      {{- end }}
      serviceAccountName: darwin
      {{- if .Values.modelCache.enabled }}
      initContainers:
      {{- if eq .Values.modelCache.strategy "emptydir" }}
      - name: model-downloader
        image: {{ .Values.modelCache.downloaderImage }}
        command:
          - python
          - /scripts/download_model_emptydir.py
        env:
          - name: MODEL_URI
            value: "{{ .Values.modelCache.modelUri }}"
          - name: OUTPUT_PATH
            value: "{{ .Values.modelCache.cachePath }}"
          - name: MAX_RETRIES
            value: "{{ .Values.modelCache.maxRetries | default 5 }}"
          - name: BACKOFF_SECONDS
            value: "{{ .Values.modelCache.backoffSeconds | default 10 }}"
          - name: MLFLOW_TRACKING_URI
            value: {{ .Values.modelCache.trackingUri | quote }}
          - name: MLFLOW_TRACKING_USERNAME
            value: {{ .Values.modelCache.trackingUsername | quote }}
          - name: MLFLOW_TRACKING_PASSWORD
            value: {{ .Values.modelCache.trackingPassword | quote }}
        resources:
          {{- toYaml .Values.modelCache.resources | nindent 10 }}
        volumeMounts:
          - name: model-downloader-script
            mountPath: /scripts
            readOnly: true
          - name: model-storage
            mountPath: {{ .Values.modelCache.cachePath }}
      {{- else }}
      - name: wait-for-model
        image: busybox:latest
        command:
          - sh
          - -c
          - |
            echo "⏳ Waiting for model to be cached at {{ .Values.modelCache.cachePath }}/{{ include "service-deployment.modelCacheKey" . }}/model/MLmodel"
            MODEL_PATH="{{ .Values.modelCache.cachePath }}/{{ include "service-deployment.modelCacheKey" . }}/model/MLmodel"
            MAX_WAIT=600
            ELAPSED=0
            
            if [ ! -d "{{ .Values.modelCache.cachePath }}" ]; then
              echo "❌ PVC mount point not accessible. PVC may not be bound."
              echo "   Check: kubectl get pvc {{ .Values.modelCache.pvcName }} -n {{ .Release.Namespace }}"
              echo "   Ensure your cluster has a ReadWriteMany storage provisioner."
              exit 1
            fi
            
            while [ ! -f "$MODEL_PATH" ]; do
              if [ $ELAPSED -ge $MAX_WAIT ]; then
                echo "❌ Timeout waiting for model cache after ${MAX_WAIT}s"
                exit 1
              fi
              echo "⏳ Model not ready yet, waiting... (${ELAPSED}s elapsed)"
              sleep 5
              ELAPSED=$((ELAPSED + 5))
            done
            
            echo "✅ Model found in cache, proceeding with startup"
        volumeMounts:
          - name: model-cache
            mountPath: {{ .Values.modelCache.cachePath }}
            readOnly: true
      {{- end }}
      {{- end }}
      containers:
      - env:
        {{- range $key, $value := .Values.envs }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        {{- if .Values.modelCache.enabled }}
        - name: MODEL_LOCAL_PATH
          {{- if eq .Values.modelCache.strategy "emptydir" }}
          value: {{ .Values.modelCache.cachePath }}/model
          {{- else }}
          value: {{ .Values.modelCache.cachePath }}/{{ include "service-deployment.modelCacheKey" . }}/model
          {{- end }}
        - name: DEPLOYMENT_NAME
          value: {{ include "service-deployment.fullname" . | quote }}
        - name: MODEL_URI
          value: {{ .Values.modelCache.modelUri | quote }}
        {{- end }}
        - name: DD_PROFILING_ENABLED
          value: "true"
        - name: PLATFORM
          value: "k8s"
        - name:  DD_RUNTIME_METRICS_ENABLED
          value: "true"
        - name: DD_LOGS_INJECTION
          value: "true"
        {{- if .Values.configServer.enabled }}
        - name: CONSUL_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{  template "service-deployment.fullname" . }}
              key: CONSUL_TOKEN
        - name: VAULT_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{  template "service-deployment.fullname" . }}
              key: VAULT_TOKEN
        {{- end }}
        - name: DD_AGENT_HOST
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: status.hostIP
        - name: DD_ENV
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.labels['tags.datadoghq.com/env']
        - name: DD_SERVICE
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.labels['tags.datadoghq.com/service']
        - name: DD_SERVICE_MAPPING
          value: |
                  aerospike:{{ .Values.name }}-aerospike,
                  cassandra:{{ .Values.name }}-cassandra,
                  datanucleus:{{ .Values.name }}-datanucleus,
                  elasticsearch:{{ .Values.name }}-elasticsearch,
                  hibernate:{{ .Values.name }}-hibernate,
                  java-aws-sdk:{{ .Values.name }}-java-aws-sdk,
                  jms:{{ .Values.name }}-jms,
                  kafka:{{ .Values.name }}-kafka,
                  memcached:{{ .Values.name }}-memcached,
                  mongo:{{ .Values.name }}-mongo,
                  rabbitmq:{{ .Values.name }}-rabbitmq,
                  redis:{{ .Values.name }}-redis,
                  twilio-sdk:{{ .Values.name }}-twilio-sdk,
                  voltdb:{{ .Values.name }}-voltdb,
                  mysql:{{ .Values.name }}-mysql
        - name: DD_TAGS
          value: "TEAM_SUFFIX:{{ .Values.envs.TEAM_SUFFIX }},VPC_SUFFIX:{{ .Values.envs.VPC_SUFFIX }}"
        - name: DD_VERSION
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.labels['tags.datadoghq.com/version']
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        livenessProbe:
{{ toYaml .Values.livenessProbe | indent 10 }}
        name: {{  template "service-deployment.fullname" . }}
        ports:
        - containerPort: {{ .Values.service.httpPort | default 8080 }}
          name: app-port
          protocol: TCP
        readinessProbe:
{{ toYaml .Values.readinessProbe | indent 10 }}
        command: {{ .Values.command }}
        resources:
{{ toYaml .Values.resources | indent 10 }}
        {{- if .Values.modelCache.enabled }}
        volumeMounts:
          {{- if eq .Values.modelCache.strategy "emptydir" }}
          - name: model-storage
            mountPath: {{ .Values.modelCache.cachePath }}
            readOnly: true
          {{- else }}
          - name: model-cache
            mountPath: {{ .Values.modelCache.cachePath }}
            readOnly: true
          {{- end }}
        {{- end }}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
      {{- with .Values.nodeSelector }}
      nodeSelector:
{{ toYaml . | indent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
{{ toYaml . | indent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
{{ toYaml . | indent 8 }}
      {{- end }}
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      terminationGracePeriodSeconds: 30
      {{- if .Values.modelCache.enabled }}
      volumes:
        {{- if eq .Values.modelCache.strategy "emptydir" }}
        - name: model-downloader-script
          configMap:
            name: {{ template "service-deployment.fullname" . }}-model-downloader
            defaultMode: 0755
        - name: model-storage
          emptyDir: {}
        {{- else }}
        - name: model-cache
          persistentVolumeClaim:
            claimName: {{ .Values.modelCache.pvcName }}
        {{- end }}
      {{- end }}
{{- end }}
