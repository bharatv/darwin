{{- if and (eq .Values.deployment.strategy "argo-rollouts") (eq .Values.deployment.rollouts.strategy "canary") (eq .Values.deployment.rollouts.trafficRouting.provider "alb") -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "service-deployment.rootServiceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "service-deployment.labels" . | nindent 4 }}
spec:
  sessionAffinity: None
  type: {{ .Values.service.type | default "ClusterIP" }}
  ports:
    - port: {{ .Values.service.externalPort }}
      targetPort: app-port
      protocol: TCP
      name: use-annotation
      {{- if (and (eq .Values.service.type "NodePort") (not (empty .Values.service.nodePort))) }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}
    {{- if .Values.tls.enabled }}
    - port: {{ .Values.tls.port | default 9899 }}
      targetPort: https
      protocol: TCP
      name: https
    {{- end }}
    {{- if .Values.service.grpcPort }}
    - port: {{ .Values.service.grpcPort }}
      targetPort: grpc
      protocol: TCP
      name: grpc
    {{- end }}
  selector:
    {{- include "service-deployment.selectorLabels" . | nindent 4 }}
{{- end }}
