runnerImage:
  image: dreamsports.jfrog.io/d11-docker-artifacts/actions-runner-maven:ubuntu-20.04

labels:
  - self-hosted
  - linux
  - X64
  - k8s
  - darwin

resources:
  limits:
    cpu: 3000m
    memory: 3Gi
  requests:
    cpu: 2000m
    memory: 2Gi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 10

serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: 'arn:aws:iam::954754807219:role/ci-cluster-service-account-role'