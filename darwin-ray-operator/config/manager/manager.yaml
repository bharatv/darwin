---
apiVersion: v1
kind: Namespace
metadata:
  name: darwin-system
  labels:
    app.kubernetes.io/name: darwin-ray-operator
    app.kubernetes.io/managed-by: helm
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: darwin-ray-operator
  namespace: darwin-system
  labels:
    app.kubernetes.io/name: darwin-ray-operator
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: darwin-ray-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: darwin-ray-operator
      annotations:
        kubectl.kubernetes.io/default-container: manager
    spec:
      serviceAccountName: darwin-ray-operator
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: darwin-ray-operator:latest
          imagePullPolicy: IfNotPresent
          args:
            - --leader-elect=true
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
            - --ray-namespace=ray
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
      terminationGracePeriodSeconds: 10
